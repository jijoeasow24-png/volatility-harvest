<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{--bg:#0a0f1e;--bg2:#111827;--bg3:#1a2035;--bg4:#222b45;--text:#e8eaf0;--text2:#94a3b8;--text3:#64748b;--green:#22c55e;--green-dim:#16a34a;--green-bg:rgba(34,197,94,.12);--red:#ef4444;--red-dim:#dc2626;--red-bg:rgba(239,68,68,.12);--blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);--orange:#f59e0b;--orange-bg:rgba(245,158,11,.12);--purple:#a855f7;--purple-bg:rgba(168,85,247,.12);--cyan:#06b6d4;--border:#1e293b;--border2:#334155;--card:#111827;--shadow:0 2px 8px rgba(0,0,0,.3)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px}

@media(min-width:768px){.main{max-width:600px;margin:0 auto}.tab-bar{max-width:600px;left:50%;transform:translateX(-50%);border-radius:12px 12px 0 0}}

const CIRCUIT_LEVELS=[{name:'Normal',thresh:'0% to -4.9%',color:'var(--green)',actions:['Follow monthly operating system','Deploy $2K per regime plan','Normal trim/add rules apply']},{name:'Yellow Alert',thresh:'-5% to -9.9%',color:'#eab308',actions:['Pause ALL new satellite buys','Review all positions','Do NOT add to losing positions','No drastic action — stay calm']},{name:'Orange Alert',thresh:'-10% to -11.9%',color:'var(--orange)',actions:['SELL ALL satellite positions NOW','Raise cash to 20%','Consider SH inverse ETF hedge','Protect core — do not sell SPY/QQQ/GLD']},{name:'Red Alert',thresh:'-12% to -14.9%',color:'var(--red)',actions:['Trim all core positions by 25%','Raise cash to 25%','Add hedge if not already on','STOP deploying monthly $2K']},{name:'HARD STOP',thresh:'-15% or worse',color:'#b91c1c',actions:['Sell ALL remaining satellites','Trim core to 40%','Cash+hedge must equal 60%','NO redeployment until SPY holds 50-day MA 2 weeks']}];
const ROLES={Core:{color:'var(--blue)',addPct:-0.07,trimPct:0.15,addSize:0.015,stopLoss:-0.20},Satellite:{color:'var(--purple)',addPct:-0.12,trimPct:0.20,addSize:0.005,stopLoss:-0.20},Hedge:{color:'var(--orange)',addPct:0,trimPct:0.12,addSize:0.01,stopLoss:-0.20}};

,addTrigger:'Down 10%',trimTrigger:'Up 18%',stopLoss:'Down 22%',notes:'Industrial metals'},{ticker:'SH',name:'Short S&P 500',theme:'Hedges',role:'Hedge',addTrigger:'SPY<200MA+dd>-10%',trimTrigger:'When resolved',stopLoss:'Max 30 days',notes:'1x inverse'}];

const fmtVol=v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v+'';
function getSignal(p){const r=ROLES[p.role];if(!r)return{name:'HOLD',color:'var(--text3)',short:'HOLD'};const pct=p.buyPrice>0?(p.currentPrice-p.buyPrice)/p.buyPrice:0;if(pct<=r.stopLoss)return{name:'EXIT — STOP LOSS',color:'#b91c1c',short:'EXIT ⛔'};if(p.role==='Hedge')return{name:'HOLD',color:'var(--text3)',short:'HOLD'};if(pct>=r.trimPct+.10)return{name:'TRIM STRONG',color:'var(--red)',short:'TRIM ↑↑'};if(pct>=r.trimPct)return{name:'TRIM',color:'var(--orange)',short:'TRIM ↑'};if(pct<=r.addPct*2)return{name:'ADD STRONG',color:'var(--green-dim)',short:'ADD ↓↓'};if(pct<=r.addPct)return{name:'ADD',color:'var(--green)',short:'ADD ↓'};return{name:'HOLD',color:'var(--text3)',short:'HOLD'};}
function getPnlPct(p){return p.buyPrice<=0?0:(p.currentPrice-p.buyPrice)/p.buyPrice*100;}

function daysUntil(ds){const d=new Date(ds+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.round((d-n)/864e5);}

// ─── COMPONENTS ─────────────────────────────────────────────────────────────
const Badge=({children,type='blue'})=><span className={`badge badge-${type}`}>{children}</span>;
const RoleBadge=({role})=><Badge type={role==='Core'?'blue':role==='Satellite'?'purple':'orange'}>{role}</Badge>;
const SignalBadge=({signal,compact})=><span className="badge" style={{background:signal.color,color:'#fff',fontSize:compact?10:11}}>{compact?signal.short:signal.name}</span>;
const RegimeBadge=({regime})=><span className="badge" style={{background:REGIMES[regime].color,color:'#fff'}}>{REGIMES[regime].emoji} {regime}</span>;
const Toggle=({value,onChange})=><button className={`toggle ${value?'on':''}`} onClick={()=>onChange(!value)}/>;
const Spinner=()=><span className="spin" style={{display:'inline-block',width:16,height:16,border:'2px solid var(--border2)',borderTopColor:'var(--blue)',borderRadius:'50%'}}/>;
function Sparkline({data,width=80,height=24}){if(!data||data.length<2)return null;const p=data.map(d=>d.c);const mn=Math.min(...p),mx=Math.max(...p),rng=mx-mn||1;const pts=p.map((v,i)=>`${(i/(p.length-1))*width},${height-((v-mn)/rng)*height}`).join(' ');const c=p[p.length-1]>=p[0]?'var(--green)':'var(--red)';return <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}><polyline points={pts} fill="none" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/></svg>;}
function RangeBar52({low,high,current}){if(!low||!high||!current)return null;const pct=Math.min(100,Math.max(0,((current-low)/(high-low||1))*100));return<div><div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:2}}><span>52W: ${low.toFixed(0)}</span><span>${high.toFixed(0)}</span></div><div className="range-bar"><div className="range-fill" style={{width:pct+'%'}}/><div className="range-dot" style={{left:pct+'%'}}/></div></div>;}

// ─── APP CONTEXT ────────────────────────────────────────────────────────────
const AppContext=createContext();
function AppProvider({children}){
  const [theme,setTheme]=useState(()=>localStorage.getItem('vh_theme')||'dark');
  const [positions,setPositions]=useState([]);const [portfolioPeak,setPeak]=useState(22249.92);
  const [regime,setRegime]=useState('Not Assessed');
  const [regimeAnswers,setRegimeAnswers]=useState({spy200:false,vix20:false,yields:false,oil:false,dxy:false,oilShock:false,inflation:false,recession:false});
  const [lastRegimeCheck,setLastRegimeCheck]=useState(null);
  const [autoRegimeData,setAutoRegimeData]=useState(null); // NEW: live indicator data
  const [autoRegimeLoading,setAutoRegimeLoading]=useState(false);
  const [quotes,setQuotes]=useState({});const [sparklines,setSparklines]=useState({});
  const [isRefreshing,setIsRefreshing]=useState(false);const [lastRefresh,setLastRefresh]=useState(null);const [refreshError,setRefreshError]=useState(null);
  const [monthlyHistory,setMonthlyHistory]=useState([]);const [actionChecks,setActionChecks]=useState({});
  const [notification,setNotification]=useState(null);
  const initialized=useRef(false);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('vh_theme',theme);},[theme]);
  const toggleTheme=()=>setTheme(t=>t==='dark'?'light':'dark');

  useEffect(()=>{try{const s=JSON.parse(localStorage.getItem('vh_state_v4')||'null');if(s){setPositions(s.positions||SEED);setPeak(s.portfolioPeak||22249.92);setRegime(s.regime||'Not Assessed');if(s.regimeAnswers)setRegimeAnswers(s.regimeAnswers);if(s.lastRegimeCheck)setLastRegimeCheck(new Date(s.lastRegimeCheck));if(s.monthlyHistory)setMonthlyHistory(s.monthlyHistory);if(s.actionChecks)setActionChecks(s.actionChecks);}else{setPositions(SEED);}}catch(e){setPositions(SEED);}initialized.current=true;},[]);

  const positionsValue=positions.reduce((s,p)=>s+p.currentPrice*p.shares,0);
  const positionsCost=positions.reduce((s,p)=>s+p.buyPrice*p.shares,0);
  const portfolioTotal=positionsValue;
  const totalPnL=positionsValue-positionsCost;
  const totalPnLPct=positionsCost>0?totalPnL/positionsCost*100:0;
  useEffect(()=>{if(positionsValue>portfolioPeak&&positionsValue>0)setPeak(positionsValue);},[positionsValue]);
  const drawdown=portfolioPeak>0?(portfolioTotal/portfolioPeak-1)*100:0;
  const circuitLevel=getCircuitLevel(drawdown);
  const actionableSignals=positions.filter(p=>getSignal(p).name!=='HOLD').sort((a,b)=>Math.abs(getPnlPct(b))-Math.abs(getPnlPct(a)));

  useEffect(()=>{if(!initialized.current)return;localStorage.setItem('vh_state_v4',JSON.stringify({positions,portfolioPeak,regime,regimeAnswers,lastRegimeCheck,monthlyHistory,actionChecks}));},[positions,portfolioPeak,regime,regimeAnswers,lastRegimeCheck,monthlyHistory,actionChecks]);

  // ── AUTO-REGIME FETCH ──
  const fetchAutoRegime = useCallback(async()=>{
    setAutoRegimeLoading(true);
    try{
      const r = await fetch('/api/regime');
      const data = await r.json();
      setAutoRegimeData(data);
      // Auto-apply answers and regime
      if(data.answers){
        setRegimeAnswers(data.answers);
        setRegime(data.regime);
        setLastRegimeCheck(new Date());
      }
    }catch(e){console.error('Auto-regime fetch failed',e);}
    setAutoRegimeLoading(false);
  },[]);

  // Fetch auto-regime on load and every 15 minutes
  useEffect(()=>{
    if(!initialized.current)return;
    fetchAutoRegime();
    const t=setInterval(fetchAutoRegime, 15*60*1000);
    return()=>clearInterval(t);
  },[]);

  const refreshPrices=useCallback(async()=>{
    if(positions.length===0||isRefreshing)return;
    setIsRefreshing(true);setRefreshError(null);
    try{const tickers=positions.map(p=>p.ticker).join(',');const [qR,sR]=await Promise.all([fetch(`/api/quotes?tickers=${tickers}`),fetch(`/api/sparkline?tickers=${tickers}`)]);const qD=await qR.json();const sD=await sR.json();if(Object.keys(qD).length===0)throw new Error('No data');setQuotes(qD);setSparklines(sD);setPositions(prev=>prev.map(p=>{const q=qD[p.ticker.toUpperCase()];return q?{...p,currentPrice:q.price}:p;}));setLastRefresh(new Date());
    const exits=positions.filter(p=>{const q=qD[p.ticker.toUpperCase()];if(!q)return false;const pct=(q.price-p.buyPrice)/p.buyPrice;return pct<=ROLES[p.role]?.stopLoss;});
    if(exits.length>0)setNotification({type:'danger',text:`⚠️ STOP-LOSS on ${exits.map(p=>p.ticker).join(', ')}!`});
    }catch(e){setRefreshError('Price update failed');}setIsRefreshing(false);
  },[positions.length,isRefreshing]);

  useEffect(()=>{if(!initialized.current)return;refreshPrices();const t=setInterval(refreshPrices,60000);return()=>clearInterval(t);},[positions.length]);

  useEffect(()=>{if(!initialized.current||positionsValue===0)return;const now=new Date();const key=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;setMonthlyHistory(prev=>{const idx=prev.findIndex(h=>h.month===key);const entry={month:key,value:Math.round(positionsValue),cost:Math.round(positionsCost),pnl:Math.round(totalPnL),date:now.toISOString()};if(idx>=0){const n=[...prev];n[idx]=entry;return n;}return[...prev,entry].slice(-12);});},[positionsValue]);

  const addPosition=(p)=>setPositions(prev=>[...prev,{...p,id:Date.now()}]);
  const updatePosition=(id,data)=>setPositions(prev=>prev.map(p=>p.id===id?{...p,...data}:p));
  const deletePosition=(id)=>setPositions(prev=>prev.filter(p=>p.id!==id));
  const toggleActionCheck=(key)=>setActionChecks(prev=>({...prev,[key]:!prev[key]}));

  return<AppContext.Provider value={{theme,toggleTheme,positions,setPositions,portfolioPeak,setPeak,portfolioTotal,regime,setRegime,regimeAnswers,setRegimeAnswers,lastRegimeCheck,setLastRegimeCheck,autoRegimeData,autoRegimeLoading,fetchAutoRegime,quotes,sparklines,isRefreshing,lastRefresh,refreshError,refreshPrices,positionsValue,positionsCost,totalPnL,totalPnLPct,drawdown,circuitLevel,actionableSignals,addPosition,updatePosition,deletePosition,monthlyHistory,actionChecks,toggleActionCheck,notification,setNotification}}>{children}</AppContext.Provider>;
}
const useApp=()=>useContext(AppContext);

// ─── MONTHLY ACTION PLAN ────────────────────────────────────────────────────
function MonthlyActionPlan(){
  const app=useApp();const steps=[];let n=0;
  n++;if(app.regime==='Not Assessed'){steps.push({num:n,color:'var(--blue)',title:'Complete Regime Check',desc:'Go to Regime tab — or wait for auto-detection',key:'regime',urgent:true});}else{steps.push({num:n,color:'var(--green)',title:`Regime: ${app.regime}`,desc:REGIMES[app.regime].tagline,key:'regime_done',info:true});}
  if(app.circuitLevel.name!=='Normal'){n++;steps.push({num:n,color:app.circuitLevel.color,title:`${app.circuitLevel.name}`,desc:app.circuitLevel.actions[0],key:'circuit',urgent:true});}
  // Stop-loss exits (always show)
  app.positions.filter(p=>getSignal(p).name.includes('STOP')).forEach(p=>{n++;steps.push({num:n,color:'#b91c1c',title:`EXIT ${p.ticker} — Stop-Loss`,desc:`Sell ALL ${p.shares} shares. Down ${getPnlPct(p).toFixed(1)}%.`,key:`exit_${p.ticker}`,urgent:true});});
  // HARD STOP: exit ALL satellites (even if not at stop-loss)
  const isHardStop = app.circuitLevel.name==='HARD STOP';
  const isOrangeOrWorse = ['Orange Alert','Red Alert','HARD STOP'].includes(app.circuitLevel.name);
  if (isOrangeOrWorse) {
    app.positions.filter(p=>p.role==='Satellite'&&!getSignal(p).name.includes('STOP')).forEach(p=>{n++;steps.push({num:n,color:'var(--red)',title:`EXIT ${p.ticker} — Sell ALL (${p.role})`,desc:`Circuit breaker requires selling all satellite positions. Sell ${p.shares} shares (~$${Math.round(p.currentPrice*p.shares)}).`,key:`cb_exit_${p.ticker}`,urgent:true});});
  }
  // Trim signals — only show when circuit breaker is Normal or Yellow (not Orange/Red/HARD STOP)
  if (!isOrangeOrWorse) {
    app.positions.filter(p=>getSignal(p).name.includes('TRIM')).forEach(p=>{n++;const s=getSignal(p);const pct=s.name.includes('STRONG')?35:20;const sh=Math.max(1,Math.round(p.shares*pct/100));steps.push({num:n,color:'var(--orange)',title:`TRIM ${p.ticker} — sell ${pct}%`,desc:`Sell ${sh} shares (~$${Math.round(sh*p.currentPrice)})`,key:`trim_${p.ticker}`});});
  }
  if(app.regime!=='Not Assessed'&&app.circuitLevel.name!=='HARD STOP'&&app.circuitLevel.name!=='Red Alert'){REGIMES[app.regime].plan.forEach((pl,i)=>{n++;steps.push({num:n,color:'var(--green)',title:`Deploy ${pl.amount} → ${pl.target}`,desc:pl.label?`${pl.label} per ${app.regime}`:'Per regime plan',key:`deploy_${i}`});});}else if(app.circuitLevel.name==='Red Alert'||app.circuitLevel.name==='HARD STOP'){n++;steps.push({num:n,color:'var(--red)',title:'STOP — Do NOT deploy $2K',desc:`Circuit breaker at ${app.circuitLevel.name}`,key:'no_deploy',urgent:true});}
  if(app.circuitLevel.name==='Normal'){app.positions.filter(p=>getSignal(p).name.includes('ADD')).forEach(p=>{n++;const r=ROLES[p.role];steps.push({num:n,color:'var(--green)',title:`Consider adding ${p.ticker}`,desc:`Buy ~$${Math.round(app.portfolioTotal*r.addSize)} (${(r.addSize*100).toFixed(1)}%). Down ${getPnlPct(p).toFixed(1)}%`,key:`add_${p.ticker}`});});}
  const mo=new Date().toLocaleString('en',{month:'long',year:'numeric'});
  return<div className="card action-plan"><div className="card-header"><span className="card-title">📋 {mo} Action Plan</span><span style={{fontSize:11,color:'var(--text3)'}}>{steps.filter(s=>app.actionChecks[s.key]).length}/{steps.length}</span></div><div className="divider"/>{steps.length===0?<div style={{fontSize:13,color:'var(--text3)',padding:'8px 0'}}>All clear — HOLD and do nothing.</div>:steps.map(s=><div key={s.key} className="action-step"><div className="step-num" style={{background:s.color}}>{s.num}</div><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:s.urgent?s.color:'var(--text)',...(app.actionChecks[s.key]?{textDecoration:'line-through',opacity:.5}:{})}}>{s.title}</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2,...(app.actionChecks[s.key]?{textDecoration:'line-through',opacity:.5}:{})}}>{s.desc}</div></div><button className={`step-check ${app.actionChecks[s.key]?'checked':''}`} onClick={()=>app.toggleActionCheck(s.key)}>{app.actionChecks[s.key]&&<Icon name="check" size={14} color="#fff"/>}</button></div>)}{steps.length>0&&<div style={{marginTop:10,padding:8,background:'var(--bg3)',borderRadius:8,fontSize:11,color:'var(--text3)',textAlign:'center'}}>⚠️ Deploy 1st–2nd trading day only. When in doubt → DO NOTHING.</div>}</div>;
}

// ─── POSITION MODAL ─────────────────────────────────────────────────────────
function PositionModal({position,onClose}){
  const app=useApp();const[form,setForm]=useState(position?{ticker:position.ticker,name:position.name,role:position.role,theme:position.theme,buyPrice:position.buyPrice+'',currentPrice:position.currentPrice+'',shares:position.shares+''}:{ticker:'',name:'',role:'Core',theme:'Technology',buyPrice:'',currentPrice:'',shares:''});
  const upd=(k,v)=>setForm({...form,[k]:v});const valid=form.ticker&&form.name&&parseFloat(form.buyPrice)>0&&parseFloat(form.currentPrice)>0&&parseFloat(form.shares)>0;
  const save=()=>{const d={ticker:form.ticker.toUpperCase().trim(),name:form.name.trim(),role:form.role,theme:form.theme,buyPrice:parseFloat(form.buyPrice),currentPrice:parseFloat(form.currentPrice),shares:parseFloat(form.shares)};if(position)app.updatePosition(position.id,d);else app.addPosition(d);onClose();};
  return<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-title">{position?'Edit':'Add'} Position<button onClick={onClose} style={{background:'none',border:'none',color:'var(--text3)'}}><Icon name="x" size={20}/></button></div>
  <div className="form-row"><label className="form-label">Ticker</label><input value={form.ticker} onChange={e=>upd('ticker',e.target.value)} style={{textTransform:'uppercase'}}/></div>
  <div className="form-row"><label className="form-label">Name</label><input value={form.name} onChange={e=>upd('name',e.target.value)}/></div>
  <div className="form-row"><label className="form-label">Role</label><select value={form.role} onChange={e=>upd('role',e.target.value)}>{['Core','Satellite','Hedge'].map(r=><option key={r}>{r}</option>)}</select></div>
  <div className="form-row"><label className="form-label">Theme</label><select value={form.theme} onChange={e=>upd('theme',e.target.value)}>{['Technology','Broad Market','Healthcare','Commodities','Diversifiers','Hedges'].map(t=><option key={t}>{t}</option>)}</select></div>
  <div className="form-row"><label className="form-label">Buy Price ($)</label><input type="number" step="0.01" value={form.buyPrice} onChange={e=>upd('buyPrice',e.target.value)}/></div>
  <div className="form-row"><label className="form-label">Current Price ($)</label><input type="number" step="0.01" value={form.currentPrice} onChange={e=>upd('currentPrice',e.target.value)}/></div>
  <div className="form-row"><label className="form-label">Shares</label><input type="number" step="0.01" value={form.shares} onChange={e=>upd('shares',e.target.value)}/></div>
  {valid&&(()=>{const bp=parseFloat(form.buyPrice),cp=parseFloat(form.currentPrice),pct=(cp-bp)/bp*100;return<div className="card" style={{background:'var(--bg3)',margin:'8px 0 0'}}><div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--text3)'}}>P&L</span><span style={{fontWeight:700,color:pnlColor(pct)}}>{pnlSign(pct)}{fmtPct(pct)}</span></div></div>;})()}
  <div className="form-actions"><button className="btn btn-secondary" style={{flex:1}} onClick={onClose}>Cancel</button><button className="btn btn-primary" style={{flex:1}} onClick={save} disabled={!valid}>Save</button></div>
  </div></div>;
}

// ─── DASHBOARD TAB ──────────────────────────────────────────────────────────

  const app=useApp();
  const refreshLabel=app.lastRefresh?(()=>{const d=Math.floor((Date.now()-app.lastRefresh)/1000);return d<60?'Just now':d<120?'1 min ago':Math.floor(d/60)+' min ago';})():'No data';

      <div className="stat-card"><div className="stat-label">Peak</div><div className="stat-value mono">{fmt$(app.portfolioPeak)}</div></div>

// ─── SIGNALS TAB ────────────────────────────────────────────────────────────

  return<div className="fade-in"><div className="page-header"><div className="page-title">Markets</div><button className="refresh-btn" onClick={app.refreshPrices} disabled={app.isRefreshing}><Icon name="refresh" size={14}/></button></div>
  {Object.keys(app.quotes).length===0?<div className="card" style={{textAlign:'center',padding:40}}><Spinner/></div>:<>
    <div className="card"><div className="card-header"><span className="card-title">📊 Movers</span><span style={{display:'flex',alignItems:'center',gap:4}}><span className="status-dot" style={{background:msColor}}/><span style={{fontSize:10,fontWeight:700,color:msColor}}>{msLabel}</span></span></div><div className="divider"/>{sorted.map(({pos,q})=><div key={pos.ticker} className="list-item"><div style={{flex:1}}><div style={{fontWeight:700}}>{pos.ticker}</div><div style={{fontSize:11,color:'var(--text3)'}}>{pos.name}</div></div><Sparkline data={app.sparklines[pos.ticker.toUpperCase()]} width={50} height={18}/><div style={{textAlign:'right',marginLeft:8}}><div className="mono" style={{fontWeight:700}}>${q.price.toFixed(2)}</div><span className="badge" style={{background:q.change>=0?'var(--green-bg)':'var(--red-bg)',color:q.change>=0?'var(--green)':'var(--red)',fontSize:11}}>{q.change>=0?'▲':'▼'}{q.change>=0?'+':''}{q.changePct.toFixed(2)}%</span></div></div>)}</div>
    {volAlerts.length>0&&<div className="card"><div className="card-header"><span className="card-title">📈 Volume</span><Badge type="orange">{volAlerts.length}</Badge></div><div className="divider"/>{volAlerts.map(({pos,q})=><div key={pos.ticker} className="list-item"><div><div style={{fontWeight:700}}>{pos.ticker}</div><div style={{fontSize:11,color:'var(--text3)'}}>Vol {fmtVol(q.volume)}</div></div><div className="mono" style={{fontWeight:700,color:'var(--orange)'}}>{(q.volume/q.avgVolume).toFixed(1)}x</div></div>)}</div>}
    <div className="card"><div className="card-title" style={{marginBottom:8}}>📰 News</div><div className="chip-row" style={{marginBottom:8}}>{tickers.map((t,i)=><button key={t} className={`chip ${newsTicker===i?'active':''}`} onClick={()=>setNewsTicker(i)}>{t}</button>)}</div><div className="divider"/>{newsLoading?<div style={{textAlign:'center',padding:16}}><Spinner/></div>:news.length===0?<div style={{fontSize:12,color:'var(--text3)'}}>No news.</div>:news.map(n=><a key={n.id} href={n.url} target="_blank" rel="noopener" style={{textDecoration:'none',color:'inherit',display:'block',padding:'8px 0',borderBottom:'1px solid var(--border)'}}><div style={{fontSize:13,lineHeight:1.4}}>{n.title}</div><div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginTop:2}}><span>{n.publisher}</span><span>{timeAgo(n.publishedAt)} ↗</span></div></a>)}</div>
    <div className="card"><div className="card-title" style={{marginBottom:10}}>📅 Calendar</div><div className="divider"/>{upcoming.map(ev=>{const d=new Date(ev.date+'T00:00:00');const du=daysUntil(ev.date);return<div key={ev.date+ev.title} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}><div style={{minWidth:38,textAlign:'center'}}><div style={{background:du===0?'var(--red)':catCol[ev.cat],color:'#fff',fontSize:8,fontWeight:700,padding:'2px 0',borderRadius:'5px 5px 0 0'}}>{d.toLocaleDateString('en',{month:'short'})}</div><div style={{background:'var(--bg4)',fontSize:14,fontWeight:700,padding:'3px 0',borderRadius:'0 0 5px 5px'}}>{d.getDate()}</div></div><div><div style={{fontSize:13}}>{ev.title}</div><div style={{fontSize:10,color:du===0?'var(--red)':'var(--text3)'}}>{du===0?'TODAY':du===1?'Tomorrow':'In '+du+'d'}</div></div></div>;})}</div>
  </>}</div>;
}

// ─── WATCHLIST TAB ──────────────────────────────────────────────────────────
function WatchlistTab(){
  const [search,setSearch]=useState('');const [theme,setTheme]=useState('All');const [role,setRole]=useState(null);const [sel,setSel]=useState(null);
  const filtered=useMemo(()=>{let l=WATCHLIST;if(theme!=='All')l=l.filter(w=>w.theme===theme);if(role)l=l.filter(w=>w.role===role);if(search)l=l.filter(w=>w.ticker.toLowerCase().includes(search.toLowerCase())||w.name.toLowerCase().includes(search.toLowerCase()));return l;},[search,theme,role]);
  const grouped=useMemo(()=>{const g={};filtered.forEach(w=>{if(!g[w.theme])g[w.theme]=[];g[w.theme].push(w);});return g;},[filtered]);
  const order=['Broad Market','Technology','Healthcare','Commodities','Diversifiers','Hedges'];const icons={'Broad Market':'📊','Technology':'💻','Healthcare':'🏥','Commodities':'🏗️','Diversifiers':'🔄','Hedges':'🛡️'};
  if(sel)return<div className="fade-in"><button onClick={()=>setSel(null)} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',color:'var(--blue)',fontSize:13,fontWeight:600,marginBottom:12,padding:0}}><Icon name="back" size={16} color="var(--blue)"/> Back</button><div className="card"><div style={{fontSize:22,fontWeight:800}}>{sel.ticker}</div><div style={{color:'var(--text2)'}}>{sel.name}</div>{sel.notes&&<div style={{marginTop:8,color:'var(--blue)',background:'var(--blue-bg)',padding:8,borderRadius:6,fontSize:13}}>{sel.notes}</div>}</div><div className="card"><div className="card-title" style={{marginBottom:10}}>🎯 Triggers</div><div className="divider"/>{[{c:'var(--green)',l:'ADD',v:sel.addTrigger},{c:'var(--orange)',l:'TRIM',v:sel.trimTrigger},{c:'var(--red)',l:'Stop-Loss',v:sel.stopLoss}].map((t,i)=><div key={i} style={{display:'flex',gap:10,padding:'10px 0',borderBottom:i<2?'1px solid var(--border)':'none'}}><span style={{fontSize:18,color:t.c}}>{t.l==='ADD'?'↓':t.l==='TRIM'?'↑':'⚠'}</span><div><div style={{fontSize:11,fontWeight:700,color:'var(--text3)'}}>{t.l}</div><div style={{fontSize:14}}>{t.v}</div></div></div>)}</div></div>;
  return<div className="fade-in"><div className="page-header"><div className="page-title">Watchlist</div></div><div style={{position:'relative',marginBottom:10}}><span style={{position:'absolute',left:10,top:9,color:'var(--text3)'}}><Icon name="search" size={16}/></span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{paddingLeft:32}}/></div><div className="chip-row" style={{marginBottom:8}}>{['All',...order].map(t=><button key={t} className={`chip ${theme===t?'active':''}`} onClick={()=>setTheme(t)}>{t}</button>)}</div><div style={{display:'flex',gap:6,alignItems:'center',marginBottom:12}}><span style={{fontSize:11,color:'var(--text3)'}}>Role:</span><button className={`chip ${!role?'active':''}`} onClick={()=>setRole(null)}>All</button>{['Core','Satellite','Hedge'].map(r=><button key={r} className={`chip ${role===r?'active':''}`} onClick={()=>setRole(role===r?null:r)}>{r}</button>)}<span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)'}}>{filtered.length}</span></div>
  {order.filter(t=>grouped[t]).map(t=><div key={t}><div style={{fontSize:13,fontWeight:700,padding:'8px 0',color:'var(--text2)'}}>{icons[t]} {t} ({grouped[t].length})</div>{grouped[t].map(w=><div key={w.ticker} className="card" style={{cursor:'pointer',padding:12}} onClick={()=>setSel(w)}><div style={{display:'flex',justifyContent:'space-between'}}><div><div style={{display:'flex',gap:6}}><span style={{fontWeight:800}}>{w.ticker}</span><RoleBadge role={w.role}/></div><div style={{fontSize:11,color:'var(--text3)'}}>{w.name}</div></div><div style={{textAlign:'right',fontSize:11,color:'var(--text2)'}}>{w.addTrigger}</div></div></div>)}</div>)}</div>;
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
// ─── INTEL TAB ──────────────────────────────────────────────────────────────
function IntelTab(){
  const app=useApp();
  const [intel,setIntel]=useState(null);
  const [loading,setLoading]=useState(true);
  const [lastUpdate,setLastUpdate]=useState(null);

  const fetchIntel=async()=>{
    setLoading(true);
    try{const r=await fetch('/api/intelligence');const d=await r.json();setIntel(d);setLastUpdate(new Date());}catch(e){console.error(e);}
    setLoading(false);
  };
  useEffect(()=>{fetchIntel();},[]);

  if(loading||!intel)return<div className="fade-in"><div className="page-header"><div className="page-title">Intel</div></div><div className="card" style={{textAlign:'center',padding:40}}><Spinner/><div style={{marginTop:8,fontSize:13,color:'var(--text3)'}}>Scanning markets…</div></div></div>;

  const prioColors={high:'var(--red)',medium:'var(--orange)',low:'var(--green)'};
  const sectorBarMax=Math.max(...intel.sectors.map(s=>Math.abs(s.monthPct)),1);

  return<div className="fade-in">
    <div className="page-header"><div><div className="page-title">Market Intel</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Updated {lastUpdate?.toLocaleTimeString()}</div></div><div className="header-actions"><button className="theme-toggle" onClick={app.toggleTheme}>{app.theme==='dark'?<Icon name="sun" size={16}/>:<Icon name="moon" size={16}/>}</button><button className="refresh-btn" onClick={fetchIntel}><Icon name="refresh" size={14}/></button></div></div>

    {/* Daily Brief */}
    <div className="card" style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'2px solid var(--cyan)'}}>
      <div className="card-header"><span className="card-title">⚡ Daily Action Brief</span><span className="auto-badge"><Icon name="zap" size={10} color="#fff"/> LIVE</span></div>
      <div className="divider"/>
      {intel.brief.map((b,i)=><div key={i} style={{display:'flex',gap:10,padding:'10px 0',borderBottom:i<intel.brief.length-1?'1px solid var(--border)':'none',alignItems:'flex-start'}}>
        <span style={{fontSize:20,flexShrink:0}}>{b.icon}</span>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}><span style={{fontSize:13,fontWeight:700}}>{b.title}</span><span style={{width:6,height:6,borderRadius:'50%',background:prioColors[b.priority]||'var(--text3)'}}/></div>
          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>{b.text}</div>
        </div>
      </div>)}
    </div>

    {/* Sector Momentum */}
    <div className="card">
      <div className="card-header"><span className="card-title">📊 Sector Momentum (30d)</span><Badge type={intel.rotation.signal==='defensive'?'orange':intel.rotation.signal==='risk_on'?'green':'blue'}>{intel.rotation.signal==='defensive'?'Defensive':intel.rotation.signal==='risk_on'?'Risk-On':'Neutral'}</Badge></div>
      <div className="divider"/>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text3)',marginBottom:8}}>
        <span>Offensive avg: {intel.rotation.offensiveAvg}%</span>
        <span>Defensive avg: {intel.rotation.defensiveAvg}%</span>
      </div>
      {intel.sectors.map(s=>{
        const isPos=s.monthPct>=0;const barW=Math.min(100,(Math.abs(s.monthPct)/sectorBarMax)*100);
        return<div key={s.sym} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
          <span style={{fontSize:14,width:20}}>{s.emoji}</span>
          <span style={{fontSize:12,fontWeight:600,width:40}}>{s.sym}</span>
          <div style={{flex:1,height:16,background:'var(--bg4)',borderRadius:3,overflow:'hidden',position:'relative',display:'flex',justifyContent:isPos?'flex-start':'flex-end'}}>
            <div style={{width:barW+'%',height:'100%',background:isPos?'var(--green)':'var(--red)',borderRadius:3,opacity:.7}}/>
          </div>
          <span className="mono" style={{fontSize:12,fontWeight:700,width:55,textAlign:'right',color:isPos?'var(--green)':'var(--red)'}}>{isPos?'+':''}{s.monthPct.toFixed(1)}%</span>
          <span className="mono" style={{fontSize:10,color:'var(--text3)',width:45,textAlign:'right'}}>{s.weekPct>=0?'+':''}{s.weekPct.toFixed(1)}%w</span>
        </div>;
      })}
      <div className="divider"/>
      <div style={{fontSize:11,color:'var(--text3)'}}>Market breadth: {intel.breadth.bullish} sectors up, {intel.breadth.bearish} down</div>
    </div>

    {/* Smart Money Signals */}
    {intel.smartSignals.length>0&&<div className="card">
      <div className="card-header"><span className="card-title">🧠 Smart Money Signals</span><Badge type="purple">{intel.smartSignals.length} active</Badge></div>
      <div className="divider"/>
      {intel.smartSignals.map(s=><div key={s.ticker} style={{padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:15,fontWeight:800}}>{s.ticker}</span><span className="mono" style={{fontSize:13}}>${s.price.toFixed(2)}</span></div>
          <span className="mono" style={{fontSize:13,fontWeight:700,color:s.changePct>=0?'var(--green)':'var(--red)'}}>{s.changePct>=0?'+':''}{s.changePct.toFixed(1)}%</span>
        </div>
        {s.signals.map((sig,i)=>{
          const sigColors={volume:'var(--orange)',breakout:'var(--green)',breakdown:'var(--red)',golden:'var(--green)',death:'var(--red)',dip:'var(--blue)',surge:'var(--purple)'};
          const sigIcons={volume:'📊',breakout:'🚀',breakdown:'⚠️',golden:'✨',death:'💀',dip:'🎯',surge:'📈'};
          return<div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,marginLeft:8}}>
            <span style={{fontSize:12}}>{sigIcons[sig.type]||'•'}</span>
            <span style={{fontSize:11,color:sigColors[sig.type]||'var(--text2)'}}>{sig.text}</span>
          </div>;
        })}
      </div>)}
    </div>}

    {/* What To Do Now */}
    <div className="card" style={{background:'var(--blue-bg)',border:'1px solid var(--blue)'}}>
      <div className="card-title" style={{marginBottom:10}}>🎯 What Smart Money Is Doing</div>
      <div className="divider"/>
      {intel.rotation.signal==='defensive'?<>
        <div style={{fontSize:13,marginBottom:8}}>Institutional money is rotating into defensive assets. The market is pricing in risk.</div>
        <div style={{fontSize:13,marginBottom:4}}>✅ <b>Buy:</b> GLD, XLV, XLP, XLU — defensive sectors leading</div>
        <div style={{fontSize:13,marginBottom:4}}>⏸️ <b>Hold:</b> Core positions — don't panic sell</div>
        <div style={{fontSize:13}}>❌ <b>Avoid:</b> New speculative positions, leveraged bets</div>
      </>:intel.rotation.signal==='risk_on'?<>
        <div style={{fontSize:13,marginBottom:8}}>Growth and cyclical sectors leading. Smart money is adding risk.</div>
        <div style={{fontSize:13,marginBottom:4}}>✅ <b>Buy:</b> QQQ, XLK, SMH — tech/growth leading</div>
        <div style={{fontSize:13,marginBottom:4}}>⏸️ <b>Hold:</b> Core tech — momentum is your friend</div>
        <div style={{fontSize:13}}>❌ <b>Avoid:</b> Over-concentrating, ignoring stop-losses</div>
      </>:<>
        <div style={{fontSize:13,marginBottom:8}}>No clear rotation direction. Markets are undecided.</div>
        <div style={{fontSize:13,marginBottom:4}}>✅ <b>Buy:</b> Only on strong dips (-7%+) in core holdings</div>
        <div style={{fontSize:13,marginBottom:4}}>⏸️ <b>Hold:</b> Current positions — wait for clarity</div>
        <div style={{fontSize:13}}>❌ <b>Avoid:</b> Overtrading — when in doubt, do nothing</div>
      </>}
    </div>
  </div>;
}

function App(){const [tab,setTab]=useState('dashboard');const tabs=[{id:'dashboard',label:'Dashboard',icon:'dashboard'},{id:'intel',label:'Intel',icon:'zap'},{id:'regime',label:'Regime',icon:'regime'},{id:'signals',label:'Signals',icon:'signals'},{id:'portfolio',label:'Portfolio',icon:'portfolio'},{id:'markets',label:'Markets',icon:'markets'}];
return<AppProvider><AppContent tab={tab} setTab={setTab} tabs={tabs}/></AppProvider>;}
function AppContent({tab,setTab,tabs}){const app=useApp();return<div className="app">{app.notification&&<div style={{position:'fixed',top:0,left:0,right:0,zIndex:200,padding:12,background:'linear-gradient(135deg,#b91c1c,#dc2626)',color:'#fff',fontSize:13,fontWeight:600,display:'flex',justifyContent:'space-between'}}><span>{app.notification.text}</span><button onClick={()=>app.setNotification(null)} style={{background:'none',border:'none',color:'#fff',fontWeight:700}}>✕</button></div>}<div className="main">{tab==='dashboard'&&<DashboardTab/>}{tab==='intel'&&<IntelTab/>}{tab==='regime'&&<RegimeTab/>}{tab==='signals'&&<SignalsTab/>}{tab==='portfolio'&&<PortfolioTab/>}{tab==='markets'&&<MarketsTab/>}</div><div className="tab-bar">{tabs.map(t=><button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}><Icon name={t.icon} size={20} color={tab===t.id?'var(--blue)':'var(--text3)'}/><span>{t.label}</span></button>)}</div></div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
