<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── Theme Variables ── */
:root, [data-theme="dark"] {
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2035;--bg4:#222b45;
  --text:#e8eaf0;--text2:#94a3b8;--text3:#64748b;
  --green:#22c55e;--green-dim:#16a34a;--green-bg:rgba(34,197,94,.12);
  --red:#ef4444;--red-dim:#dc2626;--red-bg:rgba(239,68,68,.12);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);
  --orange:#f59e0b;--orange-bg:rgba(245,158,11,.12);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.12);
  --cyan:#06b6d4;
  --border:#1e293b;--border2:#334155;
  --card:#111827;--card-hover:#1a2035;
  --radius:12px;--shadow:0 2px 8px rgba(0,0,0,.3);
}
[data-theme="light"] {
  --bg:#f1f5f9;--bg2:#ffffff;--bg3:#e2e8f0;--bg4:#cbd5e1;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --green:#16a34a;--green-dim:#15803d;--green-bg:rgba(22,163,74,.1);
  --red:#dc2626;--red-dim:#b91c1c;--red-bg:rgba(220,38,38,.1);
  --blue:#2563eb;--blue-bg:rgba(37,99,235,.1);
  --orange:#d97706;--orange-bg:rgba(217,119,6,.1);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,.1);
  --cyan:#0891b2;
  --border:#e2e8f0;--border2:#cbd5e1;
  --card:#ffffff;--card-hover:#f8fafc;
  --shadow:0 2px 8px rgba(0,0,0,.08);
}

html,body,#root{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;transition:background .3s,color .3s}
.mono{font-family:'JetBrains Mono',monospace}
input,textarea,select{background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;outline:none;width:100%;transition:all .2s}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(34,197,94,.2)}50%{box-shadow:0 0 20px rgba(34,197,94,.4)}}
.fade-in{animation:fadeIn .3s ease}.pulse{animation:pulse 1.5s infinite}.spin{animation:spin 1s linear infinite}

/* App layout */
.app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;padding-bottom:80px;scroll-behavior:smooth}
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--bg2);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:4px 0 env(safe-area-inset-bottom,6px);z-index:100;transition:background .3s}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 0;background:none;border:none;color:var(--text3);font-size:9px;font-weight:600;transition:all .2s}
.tab-btn.active{color:var(--blue)}
.tab-btn svg{width:20px;height:20px}

/* Notification banner */
.notif-banner{position:fixed;top:0;left:0;right:0;z-index:200;padding:12px 16px;background:linear-gradient(135deg,#b91c1c,#dc2626);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;animation:slideDown .3s ease}
.notif-banner.warn{background:linear-gradient(135deg,#d97706,#f59e0b)}
.notif-banner.info{background:linear-gradient(135deg,#2563eb,#3b82f6)}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);transition:all .3s}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.divider{height:1px;background:var(--border);margin:10px 0}

/* Action Plan Card - Special styling */
.action-plan{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:2px solid var(--blue);position:relative;overflow:hidden}
.action-plan::before{content:'';position:absolute;top:-50%;right:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(59,130,246,.04) 0%,transparent 70%);pointer-events:none}
.action-step{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.action-step:last-child{border-bottom:none}
.step-num{min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.step-done{text-decoration:line-through;opacity:.5}
.step-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;margin-top:4px}
.step-check.checked{background:var(--green);border-color:var(--green)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;transition:all .3s}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:600}
.stat-value{font-size:18px;font-weight:800;margin-top:2px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}

/* Toggle switch */
.toggle{position:relative;width:44px;height:24px;background:var(--bg4);border-radius:12px;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

/* Theme toggle */
.theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s}
.theme-toggle:hover{background:var(--bg4)}

/* Progress bar */
.progress-bar{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:5px;transition:width .5s ease}

/* Header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header-actions{display:flex;gap:6px;align-items:center}
.refresh-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;display:flex;align-items:center;gap:5px;font-weight:600;transition:all .15s}
.refresh-btn:hover{background:var(--bg4)}
.refresh-btn:disabled{opacity:.5}

/* Sparkline */
.sparkline{display:block}

/* 52wk bar */
.range-bar{height:4px;background:var(--bg4);border-radius:2px;position:relative;margin:6px 0}
.range-fill{position:absolute;height:100%;background:var(--blue);border-radius:2px}
.range-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--text);top:-2px;transform:translateX(-50%)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block}
.form-actions{display:flex;gap:10px;margin-top:16px}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;border:none;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-full{width:100%}

/* List items */
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}

/* Chips */
.chip-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:none;white-space:nowrap;background:var(--bg3);color:var(--text2);transition:all .15s}
.chip.active{background:var(--blue);color:#fff}

/* History chart */
.history-chart{display:flex;align-items:flex-end;gap:3px;height:80px;padding:8px 0}
.history-bar{flex:1;border-radius:3px 3px 0 0;min-width:8px;transition:height .3s;position:relative}
.history-bar:hover{opacity:.8}

/* Status dot */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}

@media(min-width:768px){
  .main{max-width:600px;margin:0 auto}
  .tab-bar{max-width:600px;left:50%;transform:translateX(-50%);border-radius:12px 12px 0 0}
}
</style>
</head>

function getSignal(pos) {
  const role = ROLES[pos.role]; if (!role) return {name:'HOLD',color:'var(--text3)',short:'HOLD'};

  if (pct>=role.trimPct+0.10) return {name:'TRIM STRONG',color:'var(--red)',short:'TRIM ↑↑'};
  if (pct>=role.trimPct) return {name:'TRIM',color:'var(--orange)',short:'TRIM ↑'};
  if (pct<=role.addPct*2) return {name:'ADD STRONG',color:'var(--green-dim)',short:'ADD ↓↓'};
  if (pct<=role.addPct) return {name:'ADD',color:'var(--green)',short:'ADD ↓'};
  return {name:'HOLD',color:'var(--text3)',short:'HOLD'};
}
function getPnlPct(pos) { return pos.buyPrice<=0?0:(pos.currentPrice-pos.buyPrice)/pos.buyPrice*100; }
function getCircuitLevel(dd) { if(dd<=-15)return CIRCUIT_LEVELS[4];if(dd<=-12)return CIRCUIT_LEVELS[3];if(dd<=-10)return CIRCUIT_LEVELS[2];if(dd<=-5)return CIRCUIT_LEVELS[1];return CIRCUIT_LEVELS[0]; }
function computeRegime(a) { if(a.oilShock)return'Oil Shock';if(a.inflation)return'Inflation Spike';if(a.recession)return'Recession Scare';return[a.spy200,a.vix20,a.yields,a.oil,a.dxy].filter(Boolean).length>=3?'Risk-On':'Risk-Off'; }
function timeAgo(ts) { const d=(Date.now()/1000)-ts;if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago'; }
function daysUntil(ds) { const d=new Date(ds+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.round((d-n)/864e5); }
function exportCSV(positions) {
  const header = 'Ticker,Name,Role,Theme,Buy Price,Current Price,Shares,Cost,Value,P&L,P&L %,Signal\n';
  const rows = positions.map(p => {
    const sig = getSignal(p); const pct = getPnlPct(p); const cost = p.buyPrice*p.shares; const val = p.currentPrice*p.shares;
    return `${p.ticker},${p.name},${p.role},${p.theme},${p.buyPrice},${p.currentPrice},${p.shares},${cost.toFixed(2)},${val.toFixed(2)},${(val-cost).toFixed(2)},${pct.toFixed(1)}%,${sig.name}`;
  }).join('\n');
  const blob = new Blob([header+rows],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`VH_Portfolio_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ─── SPARKLINE COMPONENT ────────────────────────────────────────────────────
function Sparkline({data, width=80, height=24, color}) {
  if (!data || data.length < 2) return null;
  const prices = data.map(d => d.c);
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const pts = prices.map((p,i) => `${(i/(prices.length-1))*width},${height-((p-min)/range)*height}`).join(' ');
  const lineColor = color || (prices[prices.length-1] >= prices[0] ? 'var(--green)' : 'var(--red)');
  return (
    <svg className="sparkline" width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={pts} fill="none" stroke={lineColor} strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
}

// ─── APP CONTEXT ────────────────────────────────────────────────────────────
const AppContext = createContext();
function AppProvider({children}) {
  const [theme, setTheme] = useState(()=>localStorage.getItem('vh_theme')||'dark');
  const [positions, setPositions] = useState([]);
  const [portfolioPeak, setPeak] = useState(22249.92);
  const [regime, setRegime] = useState('Not Assessed');
  const [regimeAnswers, setRegimeAnswers] = useState({spy200:false,vix20:false,yields:false,oil:false,dxy:false,oilShock:false,inflation:false,recession:false});
  const [lastRegimeCheck, setLastRegimeCheck] = useState(null);
  const [quotes, setQuotes] = useState({});
  const [sparklines, setSparklines] = useState({});
  const [isRefreshing, setIsRefreshing] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [refreshError, setRefreshError] = useState(null);
  const [monthlyHistory, setMonthlyHistory] = useState([]);
  const [actionChecks, setActionChecks] = useState({});
  const [notification, setNotification] = useState(null);
  const initialized = useRef(false);

  // Theme
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('vh_theme',theme);},[theme]);
  const toggleTheme = ()=>setTheme(t=>t==='dark'?'light':'dark');

  // Load
  useEffect(()=>{
    try {
      const s = JSON.parse(localStorage.getItem('vh_state_v3')||'null');
      if (s) {
        setPositions(s.positions||SEED_POSITIONS); setPeak(s.portfolioPeak||22249.92);
        setRegime(s.regime||'Not Assessed'); if(s.regimeAnswers)setRegimeAnswers(s.regimeAnswers);
        if(s.lastRegimeCheck)setLastRegimeCheck(new Date(s.lastRegimeCheck));
        if(s.monthlyHistory)setMonthlyHistory(s.monthlyHistory);
        if(s.actionChecks)setActionChecks(s.actionChecks);
      } else { setPositions(SEED_POSITIONS); }
    } catch(e){ setPositions(SEED_POSITIONS); }
    initialized.current = true;
  },[]);

  // Auto-calculated values
  const positionsValue = positions.reduce((s,p)=>s+p.currentPrice*p.shares,0);
  const positionsCost = positions.reduce((s,p)=>s+p.buyPrice*p.shares,0);
  const portfolioTotal = positionsValue; // AUTO-CALCULATED
  const totalPnL = positionsValue - positionsCost;
  const totalPnLPct = positionsCost>0?totalPnL/positionsCost*100:0;

  // Auto-update peak
  useEffect(()=>{ if(positionsValue>portfolioPeak && positionsValue>0)setPeak(positionsValue); },[positionsValue]);

  const drawdown = portfolioPeak>0?(portfolioTotal/portfolioPeak-1)*100:0;
  const circuitLevel = getCircuitLevel(drawdown);
  const actionableSignals = positions.filter(p=>getSignal(p).name!=='HOLD').sort((a,b)=>Math.abs(getPnlPct(b))-Math.abs(getPnlPct(a)));

  // Save
  useEffect(()=>{
    if(!initialized.current)return;
    localStorage.setItem('vh_state_v3',JSON.stringify({positions,portfolioPeak,regime,regimeAnswers,lastRegimeCheck,monthlyHistory,actionChecks}));
  },[positions,portfolioPeak,regime,regimeAnswers,lastRegimeCheck,monthlyHistory,actionChecks]);

  // Refresh prices
  const refreshPrices = useCallback(async()=>{
    if(positions.length===0||isRefreshing)return;
    setIsRefreshing(true); setRefreshError(null);
    try {
      const tickers = positions.map(p=>p.ticker).join(',');
      const [qResp, sResp] = await Promise.all([
        fetch(`/api/quotes?tickers=${tickers}`),
        fetch(`/api/sparkline?tickers=${tickers}`)
      ]);
      const qData = await qResp.json();
      const sData = await sResp.json();
      if(Object.keys(qData).length===0) throw new Error('No data');
      setQuotes(qData); setSparklines(sData);
      setPositions(prev=>prev.map(p=>{const q=qData[p.ticker.toUpperCase()];return q?{...p,currentPrice:q.price}:p;}));
      setLastRefresh(new Date());

      // Check for signals and notify
      const exits = positions.filter(p=>{const q=qData[p.ticker.toUpperCase()];if(!q)return false;const pct=(q.price-p.buyPrice)/p.buyPrice;return pct<=ROLES[p.role]?.stopLoss;});
      if(exits.length>0) setNotification({type:'danger',text:`⚠️ STOP-LOSS triggered on ${exits.map(p=>p.ticker).join(', ')}!`});
    } catch(e){ setRefreshError('Price update failed — tap ↻ to retry'); }
    setIsRefreshing(false);
  },[positions.length,isRefreshing]);

  // Auto-refresh
  useEffect(()=>{if(!initialized.current)return;refreshPrices();const t=setInterval(refreshPrices,60000);return()=>clearInterval(t);},[positions.length]);

  // Monthly snapshot
  useEffect(()=>{
    if(!initialized.current||positionsValue===0)return;
    const now = new Date(); const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    setMonthlyHistory(prev=>{
      const existing = prev.findIndex(h=>h.month===key);
      const entry = {month:key, value:Math.round(positionsValue), cost:Math.round(positionsCost), pnl:Math.round(totalPnL), date:now.toISOString()};
      if(existing>=0){ const n=[...prev]; n[existing]=entry; return n; }
      return [...prev,entry].slice(-12);
    });
  },[positionsValue]);

  const addPosition=(p)=>setPositions(prev=>[...prev,{...p,id:Date.now()}]);
  const updatePosition=(id,data)=>setPositions(prev=>prev.map(p=>p.id===id?{...p,...data}:p));
  const deletePosition=(id)=>setPositions(prev=>prev.filter(p=>p.id!==id));
  const confirmRegime=()=>{setRegime(computeRegime(regimeAnswers));setLastRegimeCheck(new Date());};
  const toggleActionCheck=(key)=>setActionChecks(prev=>({...prev,[key]:!prev[key]}));

  return <AppContext.Provider value={{theme,toggleTheme,positions,setPositions,portfolioPeak,setPeak,portfolioTotal,regime,setRegime,regimeAnswers,setRegimeAnswers,lastRegimeCheck,confirmRegime,
    quotes,sparklines,isRefreshing,lastRefresh,refreshError,refreshPrices,positionsValue,positionsCost,totalPnL,totalPnLPct,drawdown,circuitLevel,actionableSignals,
    addPosition,updatePosition,deletePosition,monthlyHistory,actionChecks,toggleActionCheck,notification,setNotification}}>{children}</AppContext.Provider>;
}
const useApp=()=>useContext(AppContext);

// ─── MONTHLY ACTION PLAN ────────────────────────────────────────────────────
function MonthlyActionPlan() {
  const app = useApp();
  const now = new Date();
  const steps = [];
  let stepNum = 0;

  // Step 1: Regime
  stepNum++;
  if (app.regime === 'Not Assessed') {
    steps.push({num:stepNum, color:'var(--blue)', title:'Complete Regime Check', desc:'Go to Regime tab → answer 5 questions → save. This determines your monthly deployment.', key:'regime', urgent:true});
  } else {
    steps.push({num:stepNum, color:'var(--green)', title:`Regime: ${app.regime}`, desc:REGIMES[app.regime].tagline, key:'regime_done', info:true});
  }

  // Step 2: Circuit breaker warning
  if (app.circuitLevel.name !== 'Normal') {
    stepNum++;
    steps.push({num:stepNum, color:app.circuitLevel.color, title:`${app.circuitLevel.name} — ${app.circuitLevel.thresh}`, desc:app.circuitLevel.actions[0], key:'circuit', urgent:true});
  }

  // Step 3: Stop-loss exits
  const exits = app.positions.filter(p=>getSignal(p).name.includes('STOP'));
  exits.forEach(p => {
    stepNum++;
    steps.push({num:stepNum, color:'#b91c1c', title:`EXIT ${p.ticker} — Stop-Loss Triggered`, desc:`Sell ALL ${p.shares} shares at market open. Down ${getPnlPct(p).toFixed(1)}%.`, key:`exit_${p.ticker}`, urgent:true});
  });

  // Step 4: Trim signals
  const trims = app.positions.filter(p=>{const s=getSignal(p).name;return s.includes('TRIM');});
  trims.forEach(p => {
    stepNum++;
    const sig = getSignal(p);
    const pct = sig.name.includes('STRONG') ? 35 : 20;
    const sh = Math.max(1,Math.round(p.shares*pct/100));
    steps.push({num:stepNum, color:'var(--orange)', title:`TRIM ${p.ticker} — sell ${pct}%`, desc:`Sell ${sh} shares (~$${Math.round(sh*p.currentPrice)}). Up ${getPnlPct(p).toFixed(1)}% from buy.`, key:`trim_${p.ticker}`});
  });

  // Step 5: Deploy monthly $2K (if circuit breaker allows)
  if (app.regime !== 'Not Assessed' && app.circuitLevel.name !== 'HARD STOP' && app.circuitLevel.name !== 'Red Alert') {
    REGIMES[app.regime].plan.forEach((plan,i) => {
      stepNum++;
      steps.push({num:stepNum, color:'var(--green)', title:`Deploy ${plan.amount} → ${plan.target}`, desc:plan.label ? `${plan.label} allocation per ${app.regime} regime` : 'Per regime deployment plan', key:`deploy_${i}`});
    });
  } else if (app.circuitLevel.name === 'Red Alert' || app.circuitLevel.name === 'HARD STOP') {
    stepNum++;
    steps.push({num:stepNum, color:'var(--red)', title:'STOP — Do NOT deploy $2K this month', desc:`Circuit breaker at ${app.circuitLevel.name}. Monthly contribution is paused.`, key:'no_deploy', urgent:true});
  }

  // Step 6: Add signals
  const adds = app.positions.filter(p=>{const s=getSignal(p).name;return s.includes('ADD');});
  if (adds.length > 0 && app.circuitLevel.name === 'Normal') {
    adds.forEach(p => {
      stepNum++;
      const role = ROLES[p.role];
      const size = Math.round(app.portfolioTotal * role.addSize);
      steps.push({num:stepNum, color:'var(--green)', title:`Consider adding to ${p.ticker}`, desc:`Buy ~$${size} worth (${(role.addSize*100).toFixed(1)}% of portfolio). Down ${getPnlPct(p).toFixed(1)}% — wait 4 weeks between adds.`, key:`add_${p.ticker}`});
    });
  }

  return (
    <div className="card action-plan">
      <div className="card-header">
        <span className="card-title">📋 {monthName(now)} Action Plan</span>
        <span style={{fontSize:11,color:'var(--text3)'}}>{steps.filter(s=>app.actionChecks[s.key]).length}/{steps.length} done</span>
      </div>
      <div className="divider"/>
      {steps.length === 0 ? (
        <div style={{fontSize:13,color:'var(--text3)',padding:'8px 0'}}>All clear — no actions needed this month. HOLD and do nothing.</div>
      ) : steps.map(step => (
        <div key={step.key} className="action-step">
          <div className="step-num" style={{background:step.color}}>{step.num}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:step.urgent?step.color:'var(--text)',...(app.actionChecks[step.key]?{textDecoration:'line-through',opacity:.5}:{})}}>{step.title}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:2,...(app.actionChecks[step.key]?{textDecoration:'line-through',opacity:.5}:{})}}>{step.desc}</div>
          </div>
          <button className={`step-check ${app.actionChecks[step.key]?'checked':''}`} onClick={()=>app.toggleActionCheck(step.key)}>
            {app.actionChecks[step.key] && <Icon name="check" size={14} color="#fff"/>}
          </button>
        </div>
      ))}
      {steps.length > 0 && (
        <div style={{marginTop:10,padding:8,background:'var(--bg3)',borderRadius:8,fontSize:11,color:'var(--text3)',textAlign:'center'}}>
          ⚠️ Only deploy on 1st–2nd trading day. Set price alerts. When in doubt → DO NOTHING.
        </div>
      )}
    </div>
  );
}

      <div className="form-row"><label className="form-label">Buy Price ($)</label><input type="number" step="0.01" value={form.buyPrice} onChange={e=>upd('buyPrice',e.target.value)}/></div>
      <div className="form-row"><label className="form-label">Current Price ($)</label><input type="number" step="0.01" value={form.currentPrice} onChange={e=>upd('currentPrice',e.target.value)}/></div>
      <div className="form-row"><label className="form-label">Shares</label><input type="number" step="0.01" value={form.shares} onChange={e=>upd('shares',e.target.value)}/></div>
      {valid&&(()=>{const bp=parseFloat(form.buyPrice),cp=parseFloat(form.currentPrice),sh=parseFloat(form.shares),pct=(cp-bp)/bp*100;return(
        <div className="card" style={{background:'var(--bg3)',margin:'8px 0 0'}}><div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--text3)'}}>P&L</span><span style={{fontWeight:700,color:pnlColor(pct)}}>{pnlSign(pct)}{fmtPct(pct)}</span></div><div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginTop:4}}><span style={{color:'var(--text3)'}}>Value</span><span style={{fontWeight:700}}>{fmt$(cp*sh)}</span></div></div>
      );})()}

    </div></div>
  );
}

// ─── SIGNALS TAB ────────────────────────────────────────────────────────────
function SignalsTab() {
  const app = useApp();
  const [sortBy,setSortBy]=useState('signal');
  const [selected,setSelected]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const sorted=useMemo(()=>{
    const order=['EXIT — STOP LOSS','TRIM STRONG','TRIM','ADD STRONG','ADD','HOLD'];
    const list=[...app.positions];
    if(sortBy==='signal')list.sort((a,b)=>order.indexOf(getSignal(a).name)-order.indexOf(getSignal(b).name));
    else if(sortBy==='pnl')list.sort((a,b)=>Math.abs(getPnlPct(b))-Math.abs(getPnlPct(a)));
    else list.sort((a,b)=>a.ticker.localeCompare(b.ticker));
    return list;
  },[app.positions,sortBy]);

  if(selected)return <PositionDetail pos={selected} onBack={()=>setSelected(null)}/>;

  return (
    <div className="fade-in">
      <div className="page-header"><div className="page-title">Trade Signals</div><button className="refresh-btn" onClick={()=>setShowAdd(true)}><Icon name="plus" size={14}/> Add</button></div>
      <div style={{display:'flex',gap:6,marginBottom:12}}>{['signal','pnl','name'].map(s=><button key={s} className={`chip ${sortBy===s?'active':''}`} onClick={()=>setSortBy(s)}>{s==='signal'?'Signal':s==='pnl'?'P&L %':'Name'}</button>)}</div>
      {sorted.map(pos=>{const sig=getSignal(pos);const pct=getPnlPct(pos);return(
        <div key={pos.id} className="card" style={{cursor:'pointer',padding:12}} onClick={()=>setSelected(pos)}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:15,fontWeight:800}}>{pos.ticker}</span><RoleBadge role={pos.role}/></div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{pos.name}</div>
            </div>
            <Sparkline data={app.sparklines[pos.ticker.toUpperCase()]} width={60} height={20}/>
            <div style={{textAlign:'right',marginLeft:8,display:'flex',alignItems:'center',gap:8}}>
              <span className="mono" style={{fontSize:14,fontWeight:700,color:pnlColor(pct)}}>{pnlSign(pct)}{fmtPct(pct)}</span>
              <SignalBadge signal={sig} compact/>
            </div>
          </div>
        </div>
      );})}
      {showAdd&&<PositionModal onClose={()=>setShowAdd(false)} position={null}/>}
    </div>
  );
}

// ─── POSITION DETAIL ────────────────────────────────────────────────────────
function PositionDetail({pos,onBack}) {
  const app=useApp();const [showEdit,setShowEdit]=useState(false);
  const sig=getSignal(pos);const pct=getPnlPct(pos);const pnl=pos.currentPrice*pos.shares-pos.buyPrice*pos.shares;const role=ROLES[pos.role];
  const q = app.quotes[pos.ticker.toUpperCase()];
  const addPrice=pos.buyPrice*(1+role.addPct);const trim1=pos.buyPrice*(1+role.trimPct);const trim2=pos.buyPrice*(1+role.trimPct+.10);const stopPrice=pos.buyPrice*(1+role.stopLoss);
  return (
    <div className="fade-in">
      <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',color:'var(--blue)',fontSize:13,fontWeight:600,marginBottom:12,padding:0}}><Icon name="back" size={16} color="var(--blue)"/> Back</button>
      <div className="card" style={{background:sig.color+'12',borderColor:sig.color+'33'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:24,fontWeight:800}}>{pos.ticker}</span><RoleBadge role={pos.role}/></div><div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>{pos.name}</div></div>
          <div style={{display:'flex',gap:8}}><SignalBadge signal={sig}/><button className="refresh-btn" onClick={()=>setShowEdit(true)} style={{padding:'4px 8px'}}><Icon name="edit" size={14}/></button></div>
        </div>
        {/* Sparkline */}
        <div style={{marginTop:12}}><Sparkline data={app.sparklines[pos.ticker.toUpperCase()]} width={280} height={40}/></div>
      </div>
      {/* 52-week range */}
      {q&&q.fiftyTwoWeekLow&&<div className="card"><RangeBar52 low={q.fiftyTwoWeekLow} high={q.fiftyTwoWeekHigh} current={pos.currentPrice}/></div>}
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Buy Price</div><div className="stat-value mono" style={{fontSize:16}}>${pos.buyPrice.toFixed(2)}</div></div>
        <div className="stat-card"><div className="stat-label">Current</div><div className="stat-value mono" style={{fontSize:16}}>${pos.currentPrice.toFixed(2)}</div></div>
        <div className="stat-card"><div className="stat-label">Shares</div><div className="stat-value mono" style={{fontSize:16}}>{pos.shares}</div></div>
        <div className="stat-card"><div className="stat-label">P&L</div><div className="stat-value mono" style={{fontSize:16,color:pnlColor(pnl)}}>{pnlSign(pnl)}{fmt$(pnl)}</div><div className="stat-sub">{pnlSign(pct)}{fmtPct(pct)}</div></div>
      </div>
      {/* Action */}
      <div className="card">
        <div className="card-header"><span style={{fontSize:16,fontWeight:800}}>What to Do</span><SignalBadge signal={sig}/></div><div className="divider"/>
        {sig.name.includes('STOP')?<div style={{background:'rgba(185,28,28,.12)',padding:12,borderRadius:8,border:'1px solid rgba(185,28,28,.3)'}}><div style={{fontWeight:800,color:'#f87171',marginBottom:6}}>⚠️ STOP-LOSS — EXIT NOW</div><div style={{fontSize:13}}>Down {fmtPct(pct)} from ${pos.buyPrice.toFixed(2)}.</div><div style={{background:'#b91c1c',color:'#fff',fontWeight:800,fontSize:14,textAlign:'center',padding:10,borderRadius:8,marginTop:8}}>SELL ALL {pos.shares} SHARES</div></div>
        :sig.name.includes('TRIM')?<div><div style={{color:sig.color,fontWeight:700,fontSize:13,marginBottom:6}}>↑ TRIM</div><div style={{background:sig.color+'15',padding:10,borderRadius:8,fontSize:14,fontWeight:600}}>Sell {sig.name.includes('STRONG')?'35%':'20%'} → {Math.max(1,Math.round(pos.shares*(sig.name.includes('STRONG')?.35:.20)))} shares (~${Math.round(Math.max(1,Math.round(pos.shares*(sig.name.includes('STRONG')?.35:.20)))*pos.currentPrice)})</div></div>
        :sig.name.includes('ADD')?<div><div style={{color:sig.color,fontWeight:700,fontSize:13,marginBottom:6}}>↓ ADD</div><div style={{background:sig.color+'15',padding:10,borderRadius:8,fontSize:14,fontWeight:600}}>Buy ~${Math.round(app.portfolioTotal*role.addSize)} worth ({(role.addSize*100).toFixed(1)}% of portfolio)</div></div>
        :<div style={{display:'flex',alignItems:'center',gap:8,color:'var(--text3)'}}><Icon name="check" size={16}/><span style={{fontSize:13}}>No action required.</span></div>}
      </div>
      {/* Triggers */}
      <div className="card">
        <div className="card-title" style={{marginBottom:10}}>🎯 Price Triggers</div><div className="divider"/>
        {[{l:'Add',p:addPrice,c:'var(--green)',n:`${Math.round(role.addPct*100)}% below buy`},{l:'Trim 20%',p:trim1,c:'var(--orange)',n:`+${Math.round(role.trimPct*100)}%`},{l:'Trim 15%',p:trim2,c:'var(--red)',n:`+${Math.round((role.trimPct+.10)*100)}%`},{l:'Stop EXIT',p:stopPrice,c:'#b91c1c',n:'-20%'}].map((t,i)=>{
          const hit=(t.c==='var(--green)'&&pos.currentPrice<=t.p)||(t.c!=='var(--green)'&&pos.currentPrice>=t.p);
          return <div key={i} style={{display:'flex',alignItems:'center',padding:'6px 0',gap:8}}><span style={{width:8,height:8,borderRadius:'50%',background:t.c}}/><span style={{fontSize:13,flex:1}}>{t.l}</span><span className="mono" style={{fontSize:13,fontWeight:700,color:t.c}}>${t.p.toFixed(2)}</span>{hit&&<span className="badge" style={{background:t.c,color:'#fff',fontSize:9}}>NOW</span>}</div>;
        })}
      </div>
      {showEdit&&<PositionModal position={pos} onClose={()=>setShowEdit(false)}/>}
    </div>
  );
}

  const app=useApp();const [theme,setTheme]=useState('All');const [showAdd,setShowAdd]=useState(false);
  const filtered=theme==='All'?app.positions:app.positions.filter(p=>p.theme===theme);
  const themeAllocs=useMemo(()=>{const total=Math.max(1,app.positionsValue);const g={};app.positions.forEach(p=>{if(!g[p.theme])g[p.theme]=0;g[p.theme]+=p.currentPrice*p.shares;});return Object.entries(g).map(([t,v])=>({theme:t,value:v,pct:v/total*100})).sort((a,b)=>b.value-a.value);},[app.positions,app.positionsValue]);
  return (
    <div className="fade-in">
      <div className="page-header"><div className="page-title">Portfolio</div><div className="header-actions">
        <button className="refresh-btn" onClick={()=>exportCSV(app.positions)}><Icon name="download" size={14}/> CSV</button>
        <button className="refresh-btn" onClick={()=>setShowAdd(true)}><Icon name="plus" size={14}/> Add</button>
      </div></div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Invested</div><div className="stat-value mono" style={{fontSize:16}}>{fmt$(app.positionsCost)}</div></div>
        <div className="stat-card"><div className="stat-label">Market Val</div><div className="stat-value mono" style={{fontSize:16}}>{fmt$(app.positionsValue)}</div></div>
        <div className="stat-card"><div className="stat-label">Total P&L</div><div className="stat-value mono" style={{fontSize:16,color:pnlColor(app.totalPnL)}}>{pnlSign(app.totalPnL)}{fmt$(app.totalPnL)}</div></div>
        <div className="stat-card"><div className="stat-label">Return</div><div className="stat-value mono" style={{fontSize:16,color:pnlColor(app.totalPnLPct)}}>{pnlSign(app.totalPnLPct)}{fmtPct(app.totalPnLPct)}</div></div>
      </div>
      {themeAllocs.length>0&&<div className="card"><div className="card-title" style={{marginBottom:10}}>Theme Allocation</div><div className="divider"/>{themeAllocs.map(a=><div key={a.theme} style={{marginBottom:8}}><div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}}><span>{a.theme}</span><span><span style={{color:'var(--text3)',marginRight:6}}>{fmt$(a.value)}</span><span style={{fontWeight:700,color:a.pct>30?'var(--red)':'var(--text)'}}>{fmtPct(a.pct)}</span></span></div><div className="progress-bar" style={{height:5}}><div className="progress-fill" style={{width:Math.min(100,a.pct)+'%',background:a.pct>30?'var(--red)':'var(--blue)'}}/></div></div>)}</div>}
      <div className="chip-row" style={{marginBottom:12}}>{THEMES.map(t=><button key={t} className={`chip ${theme===t?'active':''}`} onClick={()=>setTheme(t)}>{t}</button>)}</div>
      {filtered.map(pos=>{const sig=getSignal(pos);const pct=getPnlPct(pos);return(
        <div key={pos.id} className="card" style={{padding:12}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontWeight:800}}>{pos.ticker}</span><RoleBadge role={pos.role}/></div><div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{pos.shares} shares @ ${pos.buyPrice.toFixed(2)}</div></div>
            <Sparkline data={app.sparklines[pos.ticker.toUpperCase()]} width={50} height={18}/>
            <div style={{textAlign:'right',marginLeft:8}}><div className="mono" style={{fontWeight:700,fontSize:14}}>{fmt$(pos.currentPrice*pos.shares)}</div><div className="mono" style={{fontSize:12,fontWeight:700,color:pnlColor(pct)}}>{pnlSign(pct)}{fmtPct(pct)}</div><SignalBadge signal={sig} compact/></div>
          </div>
          <div style={{display:'flex',gap:6,marginTop:8}}>
            <button className="btn btn-secondary" style={{flex:1,padding:'6px 0',fontSize:11}} onClick={()=>{if(confirm(`Delete ${pos.ticker}?`))app.deletePosition(pos.id);}}><Icon name="trash" size={12} color="var(--red)"/> Delete</button>
          </div>
        </div>
      );})}
      {showAdd&&<PositionModal onClose={()=>setShowAdd(false)} position={null}/>}
    </div>
  );
}

// ─── MARKETS TAB ────────────────────────────────────────────────────────────
function MarketsTab() {
  const app=useApp();const [news,setNews]=useState([]);const [newsLoading,setNewsLoading]=useState(false);const [newsTicker,setNewsTicker]=useState(0);
  const tickers=app.positions.map(p=>p.ticker);
  const loadNews=async(t)=>{if(!t)return;setNewsLoading(true);try{const r=await fetch(`/api/news?ticker=${t}`);setNews(await r.json());}catch(e){setNews([]);}setNewsLoading(false);};
  useEffect(()=>{loadNews(tickers[0]);},[app.positions.length]);
  useEffect(()=>{if(tickers[newsTicker])loadNews(tickers[newsTicker]);},[newsTicker]);
  const sorted=useMemo(()=>app.positions.map(p=>({pos:p,q:app.quotes[p.ticker.toUpperCase()]})).filter(x=>x.q).sort((a,b)=>Math.abs(b.q.changePct)-Math.abs(a.q.changePct)),[app.positions,app.quotes]);
  const ms=Object.values(app.quotes)[0]?.marketState||'CLOSED';
  const msLabel={PRE:'Pre-Market',POST:'After Hours',REGULAR:'Market Open'}[ms]||'Closed';
  const msColor=ms==='REGULAR'?'var(--green)':(ms==='PRE'||ms==='POST')?'var(--orange)':'var(--text3)';
  const volAlerts=sorted.filter(x=>x.q.avgVolume>0&&x.q.volume/x.q.avgVolume>=1.5);
  const extHours=sorted.filter(x=>x.q.preMarketPrice||x.q.postMarketPrice);
  const upcoming=ECON_CALENDAR.filter(e=>daysUntil(e.date)>=0).slice(0,10);
  const catCol={fed:'var(--purple)',earnings:'var(--blue)',economic:'var(--cyan)'};
  return (
    <div className="fade-in">
      <div className="page-header"><div className="page-title">Markets</div><button className="refresh-btn" onClick={app.refreshPrices} disabled={app.isRefreshing}><Icon name="refresh" size={14}/></button></div>
      {Object.keys(app.quotes).length===0?<div className="card" style={{textAlign:'center',padding:40}}><Spinner/><div style={{marginTop:8,fontSize:13,color:'var(--text3)'}}>Loading…</div></div>:<>
        <div className="card"><div className="card-header"><span className="card-title">📊 Today's Movers</span><span style={{display:'flex',alignItems:'center',gap:4}}><span className="status-dot" style={{background:msColor}}/><span style={{fontSize:10,fontWeight:700,color:msColor}}>{msLabel}</span></span></div><div className="divider"/>
          {sorted.map(({pos,q})=><div key={pos.ticker} className="list-item"><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{pos.ticker}</div><div style={{fontSize:11,color:'var(--text3)'}}>{pos.name}</div></div><Sparkline data={app.sparklines[pos.ticker.toUpperCase()]} width={50} height={18}/><div style={{textAlign:'right',marginLeft:8}}><div className="mono" style={{fontSize:14,fontWeight:700}}>${q.price.toFixed(2)}</div><span className="badge" style={{background:q.change>=0?'var(--green-bg)':'var(--red-bg)',color:q.change>=0?'var(--green)':'var(--red)',fontSize:11}}>{q.change>=0?'▲':'▼'} {q.change>=0?'+':''}{q.changePct.toFixed(2)}%</span></div></div>)}
        </div>
        {extHours.length>0&&<div className="card"><div className="card-title" style={{marginBottom:10}}>🌙 Extended Hours</div><div className="divider"/>{extHours.map(({pos,q})=>{const isPre=!!q.preMarketPrice;const extP=q.preMarketPrice||q.postMarketPrice;const extPct=((extP-q.price)/q.price*100);return <div key={pos.ticker} className="list-item"><div><div style={{fontWeight:700}}>{pos.ticker}</div><Badge type="purple">{isPre?'Pre':'Post'}</Badge></div><div style={{textAlign:'right'}}><div className="mono" style={{fontWeight:700}}>${extP.toFixed(2)}</div><div className="mono" style={{fontSize:11,color:extPct>=0?'var(--green)':'var(--red)'}}>{extPct>=0?'+':''}{extPct.toFixed(2)}%</div></div></div>;})}</div>}
        <div className="card"><div className="card-header"><span className="card-title">📈 Volume Alerts</span>{volAlerts.length>0&&<Badge type="orange">{volAlerts.length}</Badge>}</div><div className="divider"/>{volAlerts.length===0?<div style={{fontSize:13,color:'var(--text3)',padding:'8px 0'}}>✅ No unusual volume.</div>:volAlerts.map(({pos,q})=><div key={pos.ticker} className="list-item"><div><div style={{fontWeight:700}}>{pos.ticker}</div><div style={{fontSize:11,color:'var(--text3)'}}>Vol {fmtVol(q.volume)} • Avg {fmtVol(q.avgVolume)}</div></div><div style={{textAlign:'right'}}><div className="mono" style={{fontWeight:700,color:'var(--orange)'}}>{(q.volume/q.avgVolume).toFixed(1)}x</div><div style={{fontSize:11,color:q.changePct>=0?'var(--green)':'var(--red)'}}>{q.changePct>=0?'↑ Bullish':'↓ Bearish'}</div></div></div>)}</div>
        <div className="card"><div className="card-title" style={{marginBottom:8}}>📰 News</div><div className="chip-row" style={{marginBottom:8}}>{tickers.map((t,i)=><button key={t} className={`chip ${newsTicker===i?'active':''}`} onClick={()=>setNewsTicker(i)}>{t}</button>)}</div><div className="divider"/>{newsLoading?<div style={{textAlign:'center',padding:16}}><Spinner/></div>:news.length===0?<div style={{fontSize:12,color:'var(--text3)'}}>No news found.</div>:news.map(n=><a key={n.id} href={n.url} target="_blank" rel="noopener" style={{textDecoration:'none',color:'inherit',display:'block',padding:'8px 0',borderBottom:'1px solid var(--border)'}}><div style={{fontSize:13,lineHeight:1.4,marginBottom:3}}>{n.title}</div><div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)'}}><span>{n.publisher}</span><span>{timeAgo(n.publishedAt)} ↗</span></div></a>)}</div>
        <div className="card"><div className="card-title" style={{marginBottom:10}}>📅 Economic Calendar</div><div className="divider"/>{upcoming.map(ev=>{const d=new Date(ev.date+'T00:00:00');const du=daysUntil(ev.date);return <div key={ev.date+ev.title} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)',alignItems:'flex-start'}}><div style={{minWidth:38,textAlign:'center'}}><div style={{background:du===0?'var(--red)':catCol[ev.cat]||'var(--blue)',color:'#fff',fontSize:8,fontWeight:700,padding:'2px 0',borderRadius:'5px 5px 0 0',textTransform:'uppercase'}}>{d.toLocaleDateString('en',{month:'short'})}</div><div style={{background:'var(--bg4)',fontSize:14,fontWeight:700,padding:'3px 0',borderRadius:'0 0 5px 5px'}}>{d.getDate()}</div></div><div style={{flex:1}}><div style={{fontSize:13}}>{ev.title}</div><div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}><span style={{fontSize:10,fontWeight:700,color:catCol[ev.cat]}}>{ev.cat.toUpperCase()}</span><span style={{width:4,height:4,borderRadius:'50%',background:ev.impact==='high'?'var(--red)':'var(--orange)'}}/><span style={{fontSize:10,color:ev.impact==='high'?'var(--red)':'var(--orange)'}}>{ev.impact==='high'?'High':'Med'}</span><span style={{marginLeft:'auto',fontSize:10,fontWeight:600,color:du===0?'var(--red)':du===1?'var(--orange)':'var(--text3)'}}>{du===0?'TODAY':du===1?'Tomorrow':'In '+du+'d'}</span></div></div></div>})}</div>
      </>}
    </div>
  );
}

// ─── WATCHLIST TAB ──────────────────────────────────────────────────────────
function WatchlistTab() {
  const app=useApp();const [search,setSearch]=useState('');const [theme,setTheme]=useState('All');const [role,setRole]=useState(null);const [selected,setSelected]=useState(null);
  const filtered=useMemo(()=>{let l=WATCHLIST;if(theme!=='All')l=l.filter(w=>w.theme===theme);if(role)l=l.filter(w=>w.role===role);if(search)l=l.filter(w=>w.ticker.toLowerCase().includes(search.toLowerCase())||w.name.toLowerCase().includes(search.toLowerCase()));return l;},[search,theme,role]);
  const grouped=useMemo(()=>{const g={};filtered.forEach(w=>{if(!g[w.theme])g[w.theme]=[];g[w.theme].push(w);});return g;},[filtered]);
  const themeOrder=['Broad Market','Technology','Healthcare','Commodities','Diversifiers','Hedges'];
  const themeIcons={'Broad Market':'📊','Technology':'💻','Healthcare':'🏥','Commodities':'🏗️','Diversifiers':'🔄','Hedges':'🛡️'};

  if(selected)return <div className="fade-in">
    <button onClick={()=>setSelected(null)} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',color:'var(--blue)',fontSize:13,fontWeight:600,marginBottom:12,padding:0}}><Icon name="back" size={16} color="var(--blue)"/> Back</button>
    <div className="card"><div style={{display:'flex',justifyContent:'space-between'}}><div><div style={{fontSize:22,fontWeight:800}}>{selected.ticker}</div><div style={{fontSize:13,color:'var(--text2)'}}>{selected.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>{selected.theme}</div></div><RoleBadge role={selected.role}/></div>{selected.notes&&<div style={{marginTop:8,fontSize:13,color:'var(--blue)',background:'var(--blue-bg)',padding:8,borderRadius:6}}>{selected.notes}</div>}</div>
    <div className="card"><div className="card-title" style={{marginBottom:10}}>🎯 Triggers</div><div className="divider"/>{[{i:'↓',c:'var(--green)',l:'ADD',v:selected.addTrigger},{i:'↑',c:'var(--orange)',l:'TRIM',v:selected.trimTrigger},{i:'⚠',c:'var(--red)',l:'Stop-Loss',v:selected.stopLoss}].map((t,i)=><div key={i} style={{display:'flex',gap:10,padding:'10px 0',borderBottom:i<2?'1px solid var(--border)':'none'}}><span style={{fontSize:18,color:t.c}}>{t.i}</span><div><div style={{fontSize:11,fontWeight:700,color:'var(--text3)'}}>{t.l}</div><div style={{fontSize:14}}>{t.v}</div></div></div>)}</div>
    <div className="card"><div className="card-title" style={{marginBottom:10}}>ℹ️ {selected.role} Rules</div><div className="divider"/>{[['Add',`${Math.round(ROLES[selected.role].addPct*100)}% pullback`],['Trim 1',`+${Math.round(ROLES[selected.role].trimPct*100)}% → sell 20%`],['Trim 2',`+${Math.round((ROLES[selected.role].trimPct+.10)*100)}% → sell 15%`],['Stop','-20% → exit full'],['Size',`${(ROLES[selected.role].addSize*100).toFixed(1)}% of portfolio`]].map(([l,v],i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:13}}><span style={{color:'var(--text3)'}}>{l}</span><span style={{fontWeight:600}}>{v}</span></div>)}</div>
  </div>;

  return (
    <div className="fade-in">
      <div className="page-header"><div className="page-title">Watchlist</div></div>
      <div style={{position:'relative',marginBottom:10}}><span style={{position:'absolute',left:10,top:9,color:'var(--text3)'}}><Icon name="search" size={16}/></span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{paddingLeft:32}}/></div>
      <div className="chip-row" style={{marginBottom:8}}>{['All','Broad Market','Technology','Healthcare','Commodities','Diversifiers','Hedges'].map(t=><button key={t} className={`chip ${theme===t?'active':''}`} onClick={()=>setTheme(t)}>{t}</button>)}</div>
      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:12}}><span style={{fontSize:11,color:'var(--text3)'}}>Role:</span><button className={`chip ${!role?'active':''}`} onClick={()=>setRole(null)}>All</button>{['Core','Satellite','Hedge'].map(r=><button key={r} className={`chip ${role===r?'active':''}`} onClick={()=>setRole(role===r?null:r)}>{r}</button>)}<span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)'}}>{filtered.length}</span></div>
      {themeOrder.filter(t=>grouped[t]).map(t=><div key={t}><div style={{display:'flex',alignItems:'center',gap:6,fontSize:13,fontWeight:700,padding:'8px 0',color:'var(--text2)'}}><span>{themeIcons[t]}</span>{t} <span style={{fontSize:11,color:'var(--text3)',fontWeight:400}}>({grouped[t].length})</span></div>{grouped[t].map(w=><div key={w.ticker} className="card" style={{cursor:'pointer',padding:12}} onClick={()=>setSelected(w)}><div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}><div><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontWeight:800}}>{w.ticker}</span><RoleBadge role={w.role}/></div><div style={{fontSize:11,color:'var(--text3)'}}>{ w.name}</div>{w.notes&&<div style={{fontSize:10,color:'var(--blue)',marginTop:2}}>{w.notes}</div>}</div><div style={{textAlign:'right',minWidth:90}}><div style={{fontSize:10,color:'var(--text3)'}}>↓ Add:</div><div style={{fontSize:11,color:'var(--text2)'}}>{w.addTrigger}</div></div></div></div>)}</div>)}
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState('dashboard');
  const tabs=[{id:'dashboard',label:'Dashboard',icon:'dashboard'},{id:'regime',label:'Regime',icon:'regime'},{id:'signals',label:'Signals',icon:'signals'},{id:'portfolio',label:'Portfolio',icon:'portfolio'},{id:'markets',label:'Markets',icon:'markets'},{id:'watchlist',label:'Watch',icon:'watchlist'}];
  return (
    <AppProvider>
      <AppContent tab={tab} setTab={setTab} tabs={tabs}/>
    </AppProvider>
  );
}

function AppContent({tab,setTab,tabs}) {
  const app = useApp();
  return (
    <div className="app">
      {/* Notification banner */}
      {app.notification&&<div className={`notif-banner ${app.notification.type==='danger'?'':'warn'}`}><span>{app.notification.text}</span><button onClick={()=>app.setNotification(null)} style={{background:'none',border:'none',color:'#fff',fontWeight:700,fontSize:16}}>✕</button></div>}
      <div className="main">
        {tab==='dashboard'&&<DashboardTab/>}
        {tab==='regime'&&<RegimeTab/>}
        {tab==='signals'&&<SignalsTab/>}
        {tab==='portfolio'&&<PortfolioTab/>}
        {tab==='markets'&&<MarketsTab/>}
        {tab==='watchlist'&&<WatchlistTab/>}
      </div>
      <div className="tab-bar">{tabs.map(t=><button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}><Icon name={t.icon} size={20} color={tab===t.id?'var(--blue)':'var(--text3)'}/><span>{t.label}</span></button>)}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
