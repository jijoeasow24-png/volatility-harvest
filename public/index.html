<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>VolatilityHarvest</title>
<link rel="manifest" href="/manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2035;--bg4:#222b45;
  --text:#e8eaf0;--text2:#94a3b8;--text3:#64748b;
  --green:#22c55e;--green-dim:#16a34a;--green-bg:rgba(34,197,94,.12);
  --red:#ef4444;--red-dim:#dc2626;--red-bg:rgba(239,68,68,.12);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);
  --orange:#f59e0b;--orange-bg:rgba(245,158,11,.12);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.12);
  --cyan:#06b6d4;
  --border:#1e293b;--border2:#334155;
  --card:#111827;--card-hover:#1a2035;
  --radius:12px;
}
html,body,#root{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
input,textarea,select{background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease}
.pulse{animation:pulse 1.5s infinite}
.spin{animation:spin 1s linear infinite}

/* App layout */
.app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;padding-bottom:80px}
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(10,15,30,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;transition:all .2s}
.tab-btn.active{color:var(--blue)}
.tab-btn svg{width:22px;height:22px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-glow{box-shadow:0 0 20px rgba(59,130,246,.06)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.divider{height:1px;background:var(--border);margin:10px 0}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:600}
.stat-value{font-size:20px;font-weight:800;margin-top:2px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-dark-red{background:rgba(180,0,0,.15);color:#f87171}

/* Toggle */
.toggle{position:relative;width:44px;height:24px;background:var(--bg4);border-radius:12px;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

/* Progress bar */
.progress-bar{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:5px;transition:width .5s ease}

/* Header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.refresh-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:12px;display:flex;align-items:center;gap:6px;font-weight:600}
.refresh-btn:disabled{opacity:.5}

/* Status dot */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block}
.form-actions{display:flex;gap:10px;margin-top:16px}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;border:none;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-full{width:100%}

/* List items */
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}

/* Chip filter */
.chip-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:none;white-space:nowrap;background:var(--bg3);color:var(--text2);transition:all .15s}
.chip.active{background:var(--blue);color:#fff}

/* Responsive */
@media(min-width:768px){
  .main{max-width:600px;margin:0 auto}
  .tab-bar{max-width:600px;left:50%;transform:translateX(-50%);border-radius:12px 12px 0 0}
}
</style>
</head>

// ─── UTILITY FUNCTIONS ─────────────────────────────────────────────────────
const fmt$ = v => '$' + Math.abs(v).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtPct = v => v.toFixed(1) + '%';
const pnlSign = v => v >= 0 ? '+' : '';
const pnlColor = v => v > 0 ? 'var(--green)' : v < 0 ? 'var(--red)' : 'var(--text3)';
const fmtVol = v => v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1e3 ? (v/1e3).toFixed(0)+'K' : v.toString();

function getSignal(pos) {
  const role = ROLES[pos.role];
  if (!role) return {name:'HOLD',color:'var(--text3)',short:'HOLD'};
  const pct = pos.buyPrice > 0 ? (pos.currentPrice - pos.buyPrice) / pos.buyPrice : 0;
  if (pct <= role.stopLoss) return {name:'EXIT — STOP LOSS',color:'#b91c1c',short:'EXIT ⛔'};
  if (pos.role === 'Hedge') return {name:'HOLD',color:'var(--text3)',short:'HOLD'};
  const add2 = role.addPct * 2, add1 = role.addPct;
  const trim1 = role.trimPct, trim2 = role.trimPct + 0.10;
  if (pct >= trim2) return {name:'TRIM STRONG',color:'var(--red)',short:'TRIM ↑↑'};
  if (pct >= trim1) return {name:'TRIM',color:'var(--orange)',short:'TRIM ↑'};
  if (pct <= add2)  return {name:'ADD STRONG',color:'var(--green-dim)',short:'ADD ↓↓'};
  if (pct <= add1)  return {name:'ADD',color:'var(--green)',short:'ADD ↓'};
  return {name:'HOLD',color:'var(--text3)',short:'HOLD'};
}

function getPnlPct(pos) {
  if (pos.buyPrice <= 0) return 0;
  return (pos.currentPrice - pos.buyPrice) / pos.buyPrice * 100;
}

function getCircuitLevel(drawdown) {
  if (drawdown <= -15) return CIRCUIT_LEVELS[4];
  if (drawdown <= -12) return CIRCUIT_LEVELS[3];
  if (drawdown <= -10) return CIRCUIT_LEVELS[2];
  if (drawdown <= -5)  return CIRCUIT_LEVELS[1];
  return CIRCUIT_LEVELS[0];
}

function computeRegime(answers) {
  if (answers.oilShock) return 'Oil Shock';
  if (answers.inflation) return 'Inflation Spike';
  if (answers.recession) return 'Recession Scare';
  const yes = [answers.spy200,answers.vix20,answers.yields,answers.oil,answers.dxy].filter(Boolean).length;
  return yes >= 3 ? 'Risk-On' : 'Risk-Off';
}

function timeAgo(ts) {
  const diff = (Date.now()/1000) - ts;
  if (diff < 3600) return Math.floor(diff/60)+'m ago';
  if (diff < 86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

function daysUntil(dateStr) {
  const d = new Date(dateStr+'T00:00:00');
  const now = new Date();now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}

// ─── APP CONTEXT ────────────────────────────────────────────────────────────
const AppContext = createContext();

function AppProvider({children}) {
  const [positions, setPositions] = useState([]);
  const [portfolioPeak, setPeak] = useState(22249.92);
  const [portfolioTotal, setTotal] = useState(20721.84);
  const [regime, setRegime] = useState('Not Assessed');
  const [regimeAnswers, setRegimeAnswers] = useState({spy200:false,vix20:false,yields:false,oil:false,dxy:false,oilShock:false,inflation:false,recession:false});
  const [lastRegimeCheck, setLastRegimeCheck] = useState(null);
  const [quotes, setQuotes] = useState({});
  const [isRefreshing, setIsRefreshing] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [refreshError, setRefreshError] = useState(null);
  const initialized = useRef(false);

  // Load from localStorage on mount
  useEffect(() => {
    const saved = loadState();
    if (saved) {
      setPositions(saved.positions || SEED_POSITIONS);
      setPeak(saved.portfolioPeak || 22249.92);
      setTotal(saved.portfolioTotal || 20721.84);
      setRegime(saved.regime || 'Not Assessed');
      if (saved.regimeAnswers) setRegimeAnswers(saved.regimeAnswers);
      if (saved.lastRegimeCheck) setLastRegimeCheck(new Date(saved.lastRegimeCheck));
    } else {
      setPositions(SEED_POSITIONS);
    }
    initialized.current = true;
  }, []);

  // Save to localStorage
  useEffect(() => {
    if (!initialized.current) return;
    saveState({positions,portfolioPeak,portfolioTotal:portfolioTotal,regime,regimeAnswers,lastRegimeCheck});
  }, [positions,portfolioPeak,portfolioTotal,regime,regimeAnswers,lastRegimeCheck]);

  // Refresh prices
  const refreshPrices = useCallback(async () => {
    if (positions.length === 0 || isRefreshing) return;
    setIsRefreshing(true);
    setRefreshError(null);
    try {
      const tickers = positions.map(p => p.ticker).join(',');
      const resp = await fetch(`/api/quotes?tickers=${tickers}`);
      const data = await resp.json();
      if (Object.keys(data).length === 0) throw new Error('No data');
      setQuotes(data);
      setPositions(prev => {
        const updated = prev.map(p => {
          const q = data[p.ticker.toUpperCase()];
          return q ? {...p, currentPrice: q.price} : p;
        });
        return updated;
      });
      setLastRefresh(new Date());
    } catch(e) {
      setRefreshError('Price update failed — tap ↻ to retry');
    }
    setIsRefreshing(false);
  }, [positions.length, isRefreshing]);

  // Auto-refresh
  useEffect(() => {
    if (!initialized.current) return;
    refreshPrices();
    const t = setInterval(refreshPrices, 60000);
    return () => clearInterval(t);
  }, [positions.length]);

  // Computed values
  const positionsValue = positions.reduce((s,p) => s+p.currentPrice*p.shares, 0);
  const positionsCost = positions.reduce((s,p) => s+p.buyPrice*p.shares, 0);
  const totalPnL = positionsValue - positionsCost;
  const totalPnLPct = positionsCost > 0 ? totalPnL/positionsCost*100 : 0;
  const drawdown = portfolioPeak > 0 ? (portfolioTotal/portfolioPeak-1)*100 : 0;
  const circuitLevel = getCircuitLevel(drawdown);
  const actionableSignals = positions.filter(p => getSignal(p).name !== 'HOLD').sort((a,b) => Math.abs(getPnlPct(b))-Math.abs(getPnlPct(a)));

  const addPosition = (p) => { setPositions(prev => [...prev, {...p, id: Date.now()}]); };
  const updatePosition = (id, data) => { setPositions(prev => prev.map(p => (p.id||p.ticker)===id ? {...p,...data} : p)); };
  const deletePosition = (id) => { setPositions(prev => prev.filter(p => (p.id||p.ticker)!==id)); };
  const confirmRegime = () => { setRegime(computeRegime(regimeAnswers)); setLastRegimeCheck(new Date()); };

  const value = {positions,setPositions,portfolioPeak,setPeak,portfolioTotal,setTotal:setTotal,
    regime,setRegime,regimeAnswers,setRegimeAnswers,lastRegimeCheck,confirmRegime,
    quotes,isRefreshing,lastRefresh,refreshError,refreshPrices,
    positionsValue,positionsCost,totalPnL,totalPnLPct,drawdown,circuitLevel,actionableSignals,
    addPosition,updatePosition,deletePosition};

  return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
}

const useApp = () => useContext(AppContext);

// ─── SIGNALS TAB ────────────────────────────────────────────────────────────
function SignalsTab() {
  const app = useApp();
  const [sortBy, setSortBy] = useState('signal');
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  const sorted = useMemo(() => {
    const order = ['EXIT — STOP LOSS','TRIM STRONG','TRIM','ADD STRONG','ADD','HOLD'];
    const list = [...app.positions];
    if (sortBy==='signal') list.sort((a,b) => order.indexOf(getSignal(a).name) - order.indexOf(getSignal(b).name));
    else if (sortBy==='pnl') list.sort((a,b) => Math.abs(getPnlPct(b)) - Math.abs(getPnlPct(a)));
    else list.sort((a,b) => a.ticker.localeCompare(b.ticker));
    return list;
  },[app.positions,sortBy]);

  if (selected) return <PositionDetail pos={selected} onBack={()=>setSelected(null)}/>;

  return (
    <div className="fade-in">
      <div className="page-header"><div className="page-title">Trade Signals</div><button className="refresh-btn" onClick={()=>setShowAdd(true)}><Icon name="plus" size={14}/> Add</button></div>

      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {['signal','pnl','name'].map(s => (
          <button key={s} className={`chip ${sortBy===s?'active':''}`} onClick={()=>setSortBy(s)}>{s==='signal'?'Signal':s==='pnl'?'P&L %':'Name'}</button>
        ))}
      </div>

      {sorted.length === 0 ? (
        <div className="card" style={{textAlign:'center',padding:40}}>
          <div style={{fontSize:40,marginBottom:12}}>📡</div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>No Positions Yet</div>
          <div style={{fontSize:13,color:'var(--text3)',marginBottom:16}}>Add your first position to start receiving trade signals.</div>
          <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>Add First Position</button>
        </div>
      ) : (
        sorted.map(pos => {
          const sig = getSignal(pos);
          const pct = getPnlPct(pos);
          return (
            <div key={pos.ticker+pos.buyPrice} className="card" style={{cursor:'pointer',padding:12}} onClick={()=>setSelected(pos)}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:15,fontWeight:800}}>{pos.ticker}</span><RoleBadge role={pos.role}/></div>
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{pos.name}</div>
                </div>
                <div style={{textAlign:'right',display:'flex',alignItems:'center',gap:8}}>
                  <span className="mono" style={{fontSize:14,fontWeight:700,color:pnlColor(pct)}}>{pnlSign(pct)}{fmtPct(pct)}</span>
                  <SignalBadge signal={sig} compact/>
                </div>
              </div>
            </div>
          );
        })
      )}

      {showAdd && <PositionModal onClose={()=>setShowAdd(false)} position={null}/>}
    </div>
  );
}

// ─── POSITION DETAIL ────────────────────────────────────────────────────────
function PositionDetail({pos, onBack}) {
  const app = useApp();
  const [showEdit, setShowEdit] = useState(false);
  const sig = getSignal(pos);
  const pct = getPnlPct(pos);
  const pnl = pos.currentPrice*pos.shares - pos.buyPrice*pos.shares;
  const role = ROLES[pos.role];

  const addPrice = pos.buyPrice * (1+role.addPct);
  const trim1Price = pos.buyPrice * (1+role.trimPct);
  const trim2Price = pos.buyPrice * (1+role.trimPct+0.10);
  const stopPrice = pos.buyPrice * (1+role.stopLoss);

  const trimInstr = () => {
    if (pct <= role.stopLoss*100) return `EXIT FULL POSITION — sell all ${pos.shares.toFixed(2)} shares`;
    if (sig.name.includes('TRIM STRONG')) { const s=Math.max(1,Math.round(pos.shares*0.35)); return `Sell 35% → ${s} shares (~$${Math.round(s*pos.currentPrice)})`; }
    if (sig.name.includes('TRIM')) { const s=Math.max(1,Math.round(pos.shares*0.20)); return `Sell 20% → ${s} shares (~$${Math.round(s*pos.currentPrice)})`; }
    return `No trim trigger yet (need +${Math.round(role.trimPct*100)}%)`;
  };
  const addInstr = () => {
    if (!sig.name.includes('ADD')) return `No add trigger yet (need ${Math.round(role.addPct*100)}%)`;
    const size = app.portfolioTotal * role.addSize;
    return `Buy $${Math.round(size)} worth (${(role.addSize*100).toFixed(1)}% of portfolio)`;
  };

  return (
    <div className="fade-in">
      <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',color:'var(--blue)',fontSize:13,fontWeight:600,marginBottom:12,padding:0}}><Icon name="back" size={16} color="var(--blue)"/> Back to Signals</button>

      <div className="card" style={{background:sig.color+'12',borderColor:sig.color+'33'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:24,fontWeight:800}}>{pos.ticker}</span><RoleBadge role={pos.role}/></div>
            <div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>{pos.name}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{pos.theme}</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <SignalBadge signal={sig}/>
            <button className="refresh-btn" onClick={()=>setShowEdit(true)} style={{padding:'4px 8px'}}><Icon name="edit" size={14}/></button>
          </div>
        </div>
      </div>

      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Buy Price</div><div className="stat-value mono" style={{fontSize:16}}>${pos.buyPrice.toFixed(2)}</div></div>
        <div className="stat-card"><div className="stat-label">Current Price</div><div className="stat-value mono" style={{fontSize:16}}>${pos.currentPrice.toFixed(2)}</div></div>
        <div className="stat-card"><div className="stat-label">Shares</div><div className="stat-value mono" style={{fontSize:16}}>{pos.shares}</div></div>
        <div className="stat-card"><div className="stat-label">P&L</div><div className="stat-value mono" style={{fontSize:16,color:pnlColor(pnl)}}>{pnlSign(pnl)}{fmt$(pnl)}</div><div className="stat-sub">{pnlSign(pct)}{fmtPct(pct)}</div></div>
        <div className="stat-card"><div className="stat-label">Total Cost</div><div className="stat-value mono" style={{fontSize:16}}>{fmt$(pos.buyPrice*pos.shares)}</div></div>
        <div className="stat-card"><div className="stat-label">Current Value</div><div className="stat-value mono" style={{fontSize:16}}>{fmt$(pos.currentPrice*pos.shares)}</div></div>
      </div>

      {/* Action card */}
      <div className="card">
        <div className="card-header"><span style={{fontSize:16,fontWeight:800}}>What to Do</span><SignalBadge signal={sig}/></div>
        <div className="divider"/>
        {sig.name.includes('STOP') ? (
          <div style={{background:'rgba(185,28,28,.12)',padding:12,borderRadius:8,border:'1px solid rgba(185,28,28,.3)'}}>
            <div style={{fontWeight:800,color:'#f87171',marginBottom:6}}>⚠️ STOP-LOSS TRIGGERED — EXIT NOW</div>
            <div style={{fontSize:13,marginBottom:6}}>Position is down {fmtPct(pct)} from buy price of ${pos.buyPrice.toFixed(2)}.</div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>Rule: Any position down -20% must be exited in full. No exceptions.</div>
            <div style={{background:'#b91c1c',color:'#fff',fontWeight:800,fontSize:14,textAlign:'center',padding:10,borderRadius:8}}>SELL ALL {pos.shares} SHARES AT MARKET OPEN</div>
          </div>
        ) : sig.name.includes('TRIM') ? (
          <div>
            <div style={{color:sig.color,fontWeight:700,fontSize:13,marginBottom:6}}>↑ TRIM INSTRUCTION</div>
            <div style={{background:sig.color+'15',padding:10,borderRadius:8,fontSize:14,fontWeight:600}}>{trimInstr()}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>After trimming, hold remaining. Set next trim alert at +{Math.round((role.trimPct+0.10)*100)}% from buy.</div>
          </div>
        ) : sig.name.includes('ADD') ? (
          <div>
            <div style={{color:sig.color,fontWeight:700,fontSize:13,marginBottom:6}}>↓ ADD INSTRUCTION</div>
            <div style={{background:sig.color+'15',padding:10,borderRadius:8,fontSize:14,fontWeight:600}}>{addInstr()}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>Don't add more than 1.5% in one buy. Wait 4 weeks before adding again.</div>
          </div>
        ) : (
          <div style={{display:'flex',alignItems:'center',gap:8,color:'var(--text3)'}}><Icon name="check" size={16}/> <span style={{fontSize:13}}>No action required. Price is within normal range.</span></div>
        )}
      </div>

      {/* Trigger levels */}
      <div className="card">
        <div className="card-title" style={{marginBottom:10}}>🎯 Your Price Triggers</div>
        <div className="divider"/>
        {[{label:'Add trigger',price:addPrice,color:'var(--green)',note:`${Math.round(role.addPct*100)}% below buy`},
          {label:'Trim 20%',price:trim1Price,color:'var(--orange)',note:`+${Math.round(role.trimPct*100)}% above buy`},
          {label:'Trim another 15%',price:trim2Price,color:'var(--red)',note:`+${Math.round((role.trimPct+0.10)*100)}% above buy`},
          {label:'Stop-loss EXIT',price:stopPrice,color:'#b91c1c',note:'-20% below buy'}
        ].map((t,i) => {
          const triggered = (t.color==='var(--green)' && pos.currentPrice<=t.price) || (t.color!=='var(--green)' && pos.currentPrice>=t.price);
          return (
            <div key={i} style={{display:'flex',alignItems:'center',padding:'6px 0',gap:8}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:t.color}}/>
              <span style={{fontSize:13,flex:1}}>{t.label}</span>
              <span className="mono" style={{fontSize:13,fontWeight:700,color:t.color}}>${t.price.toFixed(2)}</span>
              {triggered && <span className="badge" style={{background:t.color,color:'#fff',fontSize:9}}>NOW</span>}
            </div>
          );
        })}
      </div>
      {showEdit && <PositionModal position={pos} onClose={()=>setShowEdit(false)}/>}
    </div>
  );
}

// ─── POSITION MODAL (ADD/EDIT) ──────────────────────────────────────────────
function PositionModal({position, onClose}) {
  const app = useApp();
  const [form, setForm] = useState(position ? {
    ticker: position.ticker, name: position.name, role: position.role, theme: position.theme,
    buyPrice: position.buyPrice+'', currentPrice: position.currentPrice+'', shares: position.shares+''
  } : {ticker:'',name:'',role:'Core',theme:'Technology',buyPrice:'',currentPrice:'',shares:''});

  const upd = (k,v) => setForm({...form,[k]:v});
  const valid = form.ticker && form.name && parseFloat(form.buyPrice)>0 && parseFloat(form.currentPrice)>0 && parseFloat(form.shares)>0;

  const save = () => {
    const data = {ticker:form.ticker.toUpperCase().trim(),name:form.name.trim(),role:form.role,theme:form.theme,
      buyPrice:parseFloat(form.buyPrice),currentPrice:parseFloat(form.currentPrice),shares:parseFloat(form.shares)};
    if (position) app.updatePosition(position.id||position.ticker, data);
    else app.addPosition(data);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{position ? 'Edit Position' : 'Add Position'}<button onClick={onClose} style={{background:'none',border:'none',color:'var(--text3)'}}><Icon name="x" size={20}/></button></div>
        <div className="form-row"><label className="form-label">Ticker</label><input value={form.ticker} onChange={e=>upd('ticker',e.target.value)} placeholder="e.g. QQQ" style={{textTransform:'uppercase'}}/></div>
        <div className="form-row"><label className="form-label">Name</label><input value={form.name} onChange={e=>upd('name',e.target.value)} placeholder="e.g. Nasdaq-100 ETF"/></div>
        <div className="form-row"><label className="form-label">Role</label><select value={form.role} onChange={e=>upd('role',e.target.value)}>{['Core','Satellite','Hedge'].map(r => <option key={r}>{r}</option>)}</select></div>
        <div className="form-row"><label className="form-label">Theme</label><select value={form.theme} onChange={e=>upd('theme',e.target.value)}>{['Technology','Broad Market','Healthcare','Commodities','Diversifiers','Hedges'].map(t => <option key={t}>{t}</option>)}</select></div>
        <div className="form-row"><label className="form-label">Buy Price ($)</label><input type="number" step="0.01" value={form.buyPrice} onChange={e=>upd('buyPrice',e.target.value)}/></div>
        <div className="form-row"><label className="form-label">Current Price ($)</label><input type="number" step="0.01" value={form.currentPrice} onChange={e=>upd('currentPrice',e.target.value)}/></div>
        <div className="form-row"><label className="form-label">Shares</label><input type="number" step="0.01" value={form.shares} onChange={e=>upd('shares',e.target.value)}/></div>
        {valid && (() => { const bp=parseFloat(form.buyPrice),cp=parseFloat(form.currentPrice),sh=parseFloat(form.shares); const pct=(cp-bp)/bp*100; return (
          <div className="card" style={{background:'var(--bg3)',marginTop:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--text3)'}}>P&L %</span><span style={{fontWeight:700,color:pnlColor(pct)}}>{pnlSign(pct)}{fmtPct(pct)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginTop:4}}><span style={{color:'var(--text3)'}}>Value</span><span style={{fontWeight:700}}>{fmt$(cp*sh)}</span></div>
          </div>
        );})()}
        <div className="form-actions"><button className="btn btn-secondary" style={{flex:1}} onClick={onClose}>Cancel</button><button className="btn btn-primary" style={{flex:1}} onClick={save} disabled={!valid}>Save</button></div>
      </div>
    </div>
  );
}

// ─── PORTFOLIO TAB ──────────────────────────────────────────────────────────
function PortfolioTab() {
  const app = useApp();
  const [theme, setTheme] = useState('All');
  const [showAdd, setShowAdd] = useState(false);

  const filtered = theme === 'All' ? app.positions : app.positions.filter(p => p.theme === theme);

  const themeAllocs = useMemo(() => {
    const total = Math.max(1, app.positionsValue);
    const grouped = {};
    app.positions.forEach(p => {
      if (!grouped[p.theme]) grouped[p.theme] = 0;
      grouped[p.theme] += p.currentPrice * p.shares;
    });
    return Object.entries(grouped).map(([t,v]) => ({theme:t, value:v, pct:v/total*100})).sort((a,b) => b.value-a.value);
  }, [app.positions, app.positionsValue]);

  return (
    <div className="fade-in">
      <div className="page-header"><div className="page-title">Portfolio</div><button className="refresh-btn" onClick={()=>setShowAdd(true)}><Icon name="plus" size={14}/> Add</button></div>

      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Invested</div><div className="stat-value mono" style={{fontSize:16}}>{fmt$(app.positionsCost)}</div></div>

      {/* Theme Allocation */}
      {themeAllocs.length > 0 && (

                <span><span style={{color:'var(--text3)',marginRight:6}}>{fmt$(a.value)}</span><span style={{fontWeight:700,color:a.pct>30?'var(--red)':'var(--text)'}}>{fmtPct(a.pct)}</span></span>
              </div>
              <div className="progress-bar" style={{height:5}}>

            </div>
          ))}

      )}

      {/* Filter */}
      <div className="chip-row" style={{marginBottom:12}}>
        {THEMES.map(t => <button key={t} className={`chip ${theme===t?'active':''}`} onClick={()=>setTheme(t)}>{t}</button>)}
      </div>

      {/* Positions */}
      {filtered.map(pos => {
        const sig = getSignal(pos);
        const pct = getPnlPct(pos);
        return (
          <div key={pos.ticker+pos.buyPrice} className="card" style={{padding:12}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontWeight:800}}>{pos.ticker}</span><RoleBadge role={pos.role}/></div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{pos.theme}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{pos.shares} shares @ ${pos.buyPrice.toFixed(2)}</div>

                if (idx > -1 && confirm(`Delete ${pos.ticker}?`)) app.deletePosition(pos.id||pos.ticker);
              }}><Icon name="trash" size={12} color="var(--red)"/></button>

  );
}

// ─── MARKETS TAB ────────────────────────────────────────────────────────────
function MarketsTab() {
  const app = useApp();
  const [news, setNews] = useState([]);
  const [newsLoading, setNewsLoading] = useState(false);
  const [newsTicker, setNewsTicker] = useState(0);

  const tickers = app.positions.map(p => p.ticker);

  const loadNews = async (ticker) => {
    if (!ticker) return;
    setNewsLoading(true);
    try {
      const r = await fetch(`/api/news?ticker=${ticker}`);
      setNews(await r.json());
    } catch(e) { setNews([]); }
    setNewsLoading(false);
  };

  useEffect(() => { loadNews(tickers[0]); }, [app.positions.length]);
  useEffect(() => { if (tickers[newsTicker]) loadNews(tickers[newsTicker]); }, [newsTicker]);

  const sorted = useMemo(() => {
    return app.positions.map(p => ({pos:p, q:app.quotes[p.ticker.toUpperCase()]})).filter(x=>x.q).sort((a,b) => Math.abs(b.q.changePct)-Math.abs(a.q.changePct));
  }, [app.positions, app.quotes]);

  const marketState = Object.values(app.quotes)[0]?.marketState || 'CLOSED';
  const msLabel = {PRE:'Pre-Market',POST:'After Hours',REGULAR:'Market Open'}[marketState]||'Closed';
  const msColor = marketState==='REGULAR'?'var(--green)':(marketState==='PRE'||marketState==='POST')?'var(--orange)':'var(--text3)';

  const volumeAlerts = sorted.filter(x => x.q.avgVolume > 0 && x.q.volume/x.q.avgVolume >= 1.5);
  const extHours = sorted.filter(x => x.q.preMarketPrice || x.q.postMarketPrice);

  const upcomingEvents = ECON_CALENDAR.filter(e => daysUntil(e.date) >= 0).slice(0,10);
  const catColors = {fed:'var(--purple)',earnings:'var(--blue)',economic:'var(--cyan)'};

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">Markets</div>
        <button className="refresh-btn" onClick={app.refreshPrices} disabled={app.isRefreshing}><Icon name="refresh" size={14}/></button>
      </div>

      {Object.keys(app.quotes).length === 0 ? (
        <div className="card" style={{textAlign:'center',padding:40}}><Spinner/><div style={{marginTop:8,fontSize:13,color:'var(--text3)'}}>Loading market data…</div></div>
      ) : (
        <>
          {/* Daily Movers */}
          <div className="card">
            <div className="card-header">
              <span className="card-title">📊 Today's Movers</span>
              <span style={{display:'flex',alignItems:'center',gap:4}}><span className="status-dot" style={{background:msColor}}/><span style={{fontSize:10,fontWeight:700,color:msColor}}>{msLabel}</span></span>
            </div>
            <div className="divider"/>
            {sorted.map(({pos,q}) => (
              <div key={pos.ticker} className="list-item">
                <div><div style={{fontWeight:700,fontSize:14}}>{pos.ticker}</div><div style={{fontSize:11,color:'var(--text3)'}}>{pos.name}</div></div>
                <div style={{textAlign:'right'}}>
                  <div className="mono" style={{fontSize:14,fontWeight:700}}>${q.price.toFixed(2)}</div>
                  <span className="badge" style={{background:q.change>=0?'var(--green-bg)':'var(--red-bg)',color:q.change>=0?'var(--green)':'var(--red)',fontSize:11}}>
                    {q.change>=0?'▲':'▼'} {q.change>=0?'+':''}{q.changePct.toFixed(2)}%
                  </span>
                </div>
              </div>
            ))}
          </div>

          {/* Extended Hours */}
          <div className="card">
            <div className="card-title" style={{marginBottom:10}}>🌙 Extended Hours</div>
            <div className="divider"/>
            {extHours.length === 0 ? (
              <div style={{fontSize:12,color:'var(--text3)',padding:'8px 0'}}>Extended hours data appears before 9:30 AM and after 4:00 PM ET.</div>
            ) : extHours.map(({pos,q}) => {
              const isPre = !!q.preMarketPrice;
              const extP = q.preMarketPrice || q.postMarketPrice;
              const extPct = ((extP-q.price)/q.price*100);
              return (
                <div key={pos.ticker} className="list-item">
                  <div><div style={{fontWeight:700}}>{pos.ticker}</div><span className="badge badge-purple" style={{fontSize:9}}>{isPre?'Pre-Market':'After Hours'}</span></div>
                  <div style={{textAlign:'right'}}><div className="mono" style={{fontWeight:700}}>${extP.toFixed(2)}</div><div className="mono" style={{fontSize:11,color:extPct>=0?'var(--green)':'var(--red)'}}>{extPct>=0?'+':''}{extPct.toFixed(2)}%</div></div>
                </div>
              );
            })}
          </div>

          {/* Volume Alerts */}
          <div className="card">
            <div className="card-header">
              <span className="card-title">📈 Volume Alerts</span>
              {volumeAlerts.length > 0 && <Badge type="orange">{volumeAlerts.length} alert{volumeAlerts.length>1?'s':''}</Badge>}
            </div>
            <div className="divider"/>
            {volumeAlerts.length === 0 ? (
              <div style={{display:'flex',alignItems:'center',gap:6,padding:'8px 0',fontSize:13,color:'var(--text3)'}}>✅ No unusual volume today.</div>
            ) : volumeAlerts.map(({pos,q}) => {
              const ratio = q.volume/q.avgVolume;
              return (
                <div key={pos.ticker} className="list-item">
                  <div><div style={{fontWeight:700}}>{pos.ticker}</div><div style={{fontSize:11,color:'var(--text3)'}}>Vol {fmtVol(q.volume)} • Avg {fmtVol(q.avgVolume)}</div></div>
                  <div style={{textAlign:'right'}}><div className="mono" style={{fontWeight:700,color:'var(--orange)'}}>{ratio.toFixed(1)}x avg</div><div style={{fontSize:11,color:q.changePct>=0?'var(--green)':'var(--red)'}}>{q.changePct>=0?'↑ Bullish':'↓ Bearish'} surge</div></div>
                </div>
              );
            })}
          </div>

          {/* News */}
          <div className="card">
            <div className="card-title" style={{marginBottom:8}}>📰 News</div>
            <div className="chip-row" style={{marginBottom:8}}>
              {tickers.map((t,i) => <button key={t} className={`chip ${newsTicker===i?'active':''}`} onClick={()=>setNewsTicker(i)}>{t}</button>)}
            </div>
            <div className="divider"/>
            {newsLoading ? <div style={{textAlign:'center',padding:16}}><Spinner/></div> :
             news.length === 0 ? <div style={{fontSize:12,color:'var(--text3)',padding:'8px 0'}}>No recent news found.</div> :
             news.map(n => (
              <a key={n.id} href={n.url} target="_blank" rel="noopener" style={{textDecoration:'none',color:'inherit',display:'block',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{fontSize:13,lineHeight:1.4,marginBottom:3}}>{n.title}</div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)'}}>
                  <span>{n.publisher}</span>
                  <span style={{display:'flex',alignItems:'center',gap:4}}>{timeAgo(n.publishedAt)} <Icon name="link" size={10} color="var(--text3)"/></span>
                </div>
              </a>
            ))}
          </div>

          {/* Economic Calendar */}
          <div className="card">
            <div className="card-title" style={{marginBottom:10}}>📅 Economic Calendar</div>
            <div className="divider"/>
            {upcomingEvents.map(ev => {
              const d = new Date(ev.date+'T00:00:00');
              const du = daysUntil(ev.date);
              const isToday = du===0;
              return (
                <div key={ev.date+ev.title} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)',alignItems:'flex-start'}}>
                  <div style={{minWidth:38,textAlign:'center'}}>
                    <div style={{background:isToday?'var(--red)':catColors[ev.cat]||'var(--blue)',color:'#fff',fontSize:8,fontWeight:700,padding:'2px 0',borderRadius:'5px 5px 0 0',textTransform:'uppercase'}}>{d.toLocaleDateString('en',{month:'short'})}</div>
                    <div style={{background:'var(--bg4)',fontSize:14,fontWeight:700,padding:'3px 0',borderRadius:'0 0 5px 5px'}}>{d.getDate()}</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,lineHeight:1.3}}>{ev.title}</div>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
                      <span style={{fontSize:10,fontWeight:700,color:catColors[ev.cat]}}>{ev.cat.toUpperCase()}</span>
                      <span style={{width:4,height:4,borderRadius:'50%',background:ev.impact==='high'?'var(--red)':'var(--orange)'}}/>
                      <span style={{fontSize:10,color:ev.impact==='high'?'var(--red)':'var(--orange)'}}>{ev.impact==='high'?'High':'Med'} Impact</span>
                      <span style={{marginLeft:'auto',fontSize:10,fontWeight:600,color:isToday?'var(--red)':du===1?'var(--orange)':'var(--text3)'}}>{isToday?'TODAY':du===1?'Tomorrow':'In '+du+'d'}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ─── WATCHLIST TAB ──────────────────────────────────────────────────────────
function WatchlistTab() {
  const [search, setSearch] = useState('');
  const [theme, setTheme] = useState('All');
  const [role, setRole] = useState(null);
  const [selected, setSelected] = useState(null);

  const filtered = useMemo(() => {
    let list = WATCHLIST;
    if (theme !== 'All') list = list.filter(w => w.theme === theme);
    if (role) list = list.filter(w => w.role === role);
    if (search) list = list.filter(w => w.ticker.toLowerCase().includes(search.toLowerCase()) || w.name.toLowerCase().includes(search.toLowerCase()));
    return list;
  }, [search, theme, role]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(w => { if (!g[w.theme]) g[w.theme]=[]; g[w.theme].push(w); });
    return g;
  }, [filtered]);

  const themeOrder = ['Broad Market','Technology','Healthcare','Commodities','Diversifiers','Hedges'];
  const themeIcons = {'Broad Market':'📊','Technology':'💻','Healthcare':'🏥','Commodities':'🏗️','Diversifiers':'🔄','Hedges':'🛡️'};

  if (selected) return (
    <div className="fade-in">
      <button onClick={()=>setSelected(null)} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',color:'var(--blue)',fontSize:13,fontWeight:600,marginBottom:12,padding:0}}><Icon name="back" size={16} color="var(--blue)"/> Back</button>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div><div style={{fontSize:22,fontWeight:800}}>{selected.ticker}</div><div style={{fontSize:13,color:'var(--text2)'}}>{selected.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>{selected.theme}</div></div>
          <RoleBadge role={selected.role}/>
        </div>
        {selected.notes && <div style={{marginTop:8,fontSize:13,color:'var(--blue)',background:'var(--blue-bg)',padding:8,borderRadius:6}}>{selected.notes}</div>}
      </div>
      <div className="card">
        <div className="card-title" style={{marginBottom:10}}>🎯 Trading Triggers</div>
        <div className="divider"/>
        {[{icon:'↓',color:'var(--green)',label:'ADD Trigger',value:selected.addTrigger},
          {icon:'↑',color:'var(--orange)',label:'TRIM Trigger',value:selected.trimTrigger},
          {icon:'⚠',color:'var(--red)',label:'Stop-Loss',value:selected.stopLoss}
        ].map((t,i) => (
          <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',padding:'10px 0',borderBottom:i<2?'1px solid var(--border)':'none'}}>
            <span style={{fontSize:18,color:t.color}}>{t.icon}</span>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--text3)'}}>{t.label}</div><div style={{fontSize:14}}>{t.value}</div></div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-title" style={{marginBottom:10}}>ℹ️ Position Rules for {selected.role}</div>
        <div className="divider"/>
        {[['Add trigger',`${Math.round(ROLES[selected.role].addPct*100)}% pullback from 4-wk high`],
          ['First trim',`+${Math.round(ROLES[selected.role].trimPct*100)}% from buy → sell 20%`],
          ['Second trim',`+${Math.round((ROLES[selected.role].trimPct+0.10)*100)}% from buy → sell 15%`],
          ['Stop-loss','-20% from buy → exit full position'],
          ['Buy size',`${(ROLES[selected.role].addSize*100).toFixed(1)}% of portfolio`]
        ].map(([l,v],i) => (
          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:13}}>
            <span style={{color:'var(--text3)'}}>{l}</span>
            <span style={{fontWeight:600,color:l==='Stop-loss'?'var(--red)':'var(--text)'}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="fade-in">
      <div className="page-header"><div className="page-title">Watchlist</div></div>

      {/* Search */}
      <div style={{position:'relative',marginBottom:10}}>
        <span style={{position:'absolute',left:10,top:9,color:'var(--text3)'}}><Icon name="search" size={16}/></span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ticker or name…" style={{paddingLeft:32}}/>
        {search && <button onClick={()=>setSearch('')} style={{position:'absolute',right:10,top:9,background:'none',border:'none',color:'var(--text3)'}}><Icon name="x" size={16}/></button>}
      </div>

      {/* Theme filter */}
      <div className="chip-row" style={{marginBottom:8}}>
        {['All','Broad Market','Technology','Healthcare','Commodities','Diversifiers','Hedges'].map(t => (
          <button key={t} className={`chip ${theme===t?'active':''}`} onClick={()=>setTheme(t)}>{t}</button>
        ))}
      </div>

      {/* Role filter */}
      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:11,color:'var(--text3)'}}>Role:</span>
        <button className={`chip ${!role?'active':''}`} onClick={()=>setRole(null)}>All</button>
        {['Core','Satellite','Hedge'].map(r => (
          <button key={r} className={`chip ${role===r?'active':''}`} style={role===r?{}:{color:ROLES[r].color,background:ROLES[r].color+'22'}} onClick={()=>setRole(role===r?null:r)}>{r}</button>
        ))}
        <span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)'}}>{filtered.length}</span>
      </div>

      {/* List */}
      {themeOrder.filter(t => grouped[t]).map(t => (
        <div key={t}>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13,fontWeight:700,padding:'8px 0',color:'var(--text2)'}}>
            <span>{themeIcons[t]}</span><span>{t}</span><span style={{fontSize:11,color:'var(--text3)',fontWeight:400}}>({grouped[t].length})</span>
          </div>
          {grouped[t].map(w => (
            <div key={w.ticker} className="card" style={{cursor:'pointer',padding:12}} onClick={()=>setSelected(w)}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontWeight:800}}>{w.ticker}</span><RoleBadge role={w.role}/></div>
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{w.name}</div>
                  {w.notes && <div style={{fontSize:10,color:'var(--blue)',marginTop:2}}>{w.notes}</div>}
                </div>
                <div style={{textAlign:'right',minWidth:100}}>
                  <div style={{fontSize:10,color:'var(--text3)',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:3}}>↓ Add:</div>
                  <div style={{fontSize:11,color:'var(--text2)'}}>{w.addTrigger}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');

  const tabs = [
    {id:'dashboard',label:'Dashboard',icon:'dashboard'},
    {id:'regime',label:'Regime',icon:'regime'},
    {id:'signals',label:'Signals',icon:'signals'},
    {id:'portfolio',label:'Portfolio',icon:'portfolio'},
    {id:'markets',label:'Markets',icon:'markets'},
    {id:'watchlist',label:'Watchlist',icon:'watchlist'},
  ];

  return (
    <AppProvider>
      <div className="app">
        <div className="main">
          {tab==='dashboard' && <DashboardTab/>}
          {tab==='regime' && <RegimeTab/>}
          {tab==='signals' && <SignalsTab/>}
          {tab==='portfolio' && <PortfolioTab/>}
          {tab==='markets' && <MarketsTab/>}
          {tab==='watchlist' && <WatchlistTab/>}
        </div>
        <div className="tab-bar">
          {tabs.map(t => (
            <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
              <Icon name={t.icon} size={20} color={tab===t.id?'var(--blue)':'var(--text3)'}/>
              <span>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
